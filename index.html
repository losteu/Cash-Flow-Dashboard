<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KPI Cash Flow — Дашборд</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js'"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js'"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js'"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap');

:root{
  --bg:#f4f5f9; --bg2:#eef0f5;
  --sf:#ffffff;
  --bd:#e3e6ee; --bd2:#d7dbe6;
  --t1:#0f172a; --t2:#475569; --t3:#94a3b8; --t4:#cbd5e1;

  --accent:#6366f1; --accent2:#8b5cf6;
  --grad:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);

  --red:#dc2626; --rbg:#fef2f2; --rbd:#fecaca;
  --grn:#059669; --gbg:#ecfdf5; --gbd:#a7f3d0;
  --amb:#d97706; --abg:#fffbeb; --abd:#fde68a;
  --blu:#2563eb; --bbg:#eff6ff; --bbd:#bfdbfe;
  --slt:#64748b; --sbg:#f8fafc; --sbd:#e2e8f0;

  --mn:'JetBrains Mono',ui-monospace,monospace;
  --sn:'Inter',system-ui,-apple-system,sans-serif;

  --sh1:0 1px 2px rgba(15,23,42,.04);
  --sh2:0 4px 16px rgba(15,23,42,.06);
  --sh3:0 10px 32px rgba(15,23,42,.10);
  --r:14px; --r2:10px; --r3:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body,#root{font-family:var(--sn);background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ─── Header ─────────────────────────────── */
.header{background:var(--sf);border-bottom:1px solid var(--bd);padding:22px 32px 26px;position:sticky;top:0;z-index:20;box-shadow:var(--sh1)}
.header-inner{display:flex;align-items:center;gap:24px;flex-wrap:wrap;max-width:1640px;margin:0 auto}

.brand{display:flex;align-items:center;gap:12px}
.brand-logo{width:38px;height:38px;border-radius:10px;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;box-shadow:0 4px 12px rgba(99,102,241,.3)}
.brand-text{display:flex;flex-direction:column;line-height:1.1}
.brand-title{font-size:16px;font-weight:800;color:var(--t1);letter-spacing:-.3px}
.brand-sub{font-size:11px;color:var(--t3);font-weight:500;text-transform:uppercase;letter-spacing:.6px;margin-top:2px}

/* ─── Filters ────────────────────────────── */
.filters{display:flex;gap:18px;align-items:flex-end;flex:1;justify-content:flex-end;flex-wrap:wrap}

.preset-group{display:flex;flex-direction:column;gap:6px}
.preset-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;font-weight:700}
.preset-chips{display:flex;gap:6px;background:var(--bg2);padding:4px;border-radius:10px;border:1px solid var(--bd)}
.chip{padding:7px 14px;border:none;background:transparent;font-family:var(--sn);font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;border-radius:6px;transition:all .15s;white-space:nowrap}
.chip:hover{color:var(--t1)}
.chip.active{background:var(--sf);color:var(--accent);box-shadow:var(--sh1)}
.chip:disabled{opacity:.45;cursor:not-allowed}

.fld{display:flex;flex-direction:column;gap:6px}
.fld label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;font-weight:700}
.fld input{padding:9px 12px;border:1px solid var(--bd);border-radius:var(--r3);font-family:var(--mn);font-size:13px;font-weight:600;width:110px;background:var(--sf);color:var(--t1);transition:border-color .15s,box-shadow .15s}
.fld.date input{width:145px}
.fld input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.15)}

.btn-primary{padding:10px 22px;background:var(--grad);color:#fff;border:none;border-radius:var(--r3);font-weight:700;cursor:pointer;font-size:13px;font-family:var(--sn);transition:transform .1s,box-shadow .15s;box-shadow:0 4px 12px rgba(99,102,241,.25);height:40px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(99,102,241,.35)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-secondary{padding:10px 16px;background:var(--sf);color:var(--t2);border:1px solid var(--bd);border-radius:var(--r3);font-weight:700;cursor:pointer;font-size:13px;font-family:var(--sn);height:40px;transition:border-color .15s,color .15s,box-shadow .15s}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);box-shadow:0 4px 12px rgba(15,23,42,.06)}
.btn-secondary:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
.app-shell{min-height:100vh;background:var(--bg)}
.header-actions{display:flex;align-items:flex-end;gap:10px;flex-wrap:nowrap}

/* ─── Container ──────────────────────────── */
.container{max-width:1640px;margin:0 auto;padding:28px 32px 56px}

.period-info{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:20px;box-shadow:var(--sh1);flex-wrap:wrap}
.period-info-item{display:flex;flex-direction:column;gap:2px}
.period-info-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;font-weight:700}
.period-info-value{font-family:var(--mn);font-size:12px;color:var(--t1);font-weight:600}
.period-info-sep{width:1px;height:24px;background:var(--bd)}
.period-compact{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:16px;box-shadow:var(--sh1);font-family:var(--mn);font-size:12px;font-weight:600;color:var(--t2);line-height:1.45}
.period-compact-text{min-width:0}

/* ─── Tabs ──────────────────────────────── */
.tabs{display:flex;gap:6px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:4px;margin-bottom:16px;width:max-content;max-width:100%;overflow-x:auto}
.tab-btn{border:none;background:transparent;color:var(--t2);font-family:var(--sn);font-size:12px;font-weight:700;padding:9px 16px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:background .15s,color .15s,box-shadow .15s}
.tab-btn:hover{color:var(--t1)}
.tab-btn.active{background:var(--sf);color:var(--accent);box-shadow:var(--sh1)}

/* ─── Multi-select фильтры ────────────── */
.filter-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;padding:14px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:16px;box-shadow:var(--sh1)}
.filter-bar-title{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;font-weight:700;margin-right:2px;align-self:center}
.filter-summary{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;padding:12px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:12px;box-shadow:var(--sh1)}
.filter-summary-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-width:0;flex:1}
.filter-summary-title{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;font-weight:700}
.filter-summary-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;border:1px solid var(--bd);background:var(--bg2);color:var(--t2);font-size:10px;font-weight:700;line-height:1.2;white-space:nowrap}
.filter-summary-chip.active{background:#f5f6ff;border-color:rgba(99,102,241,.28);color:var(--accent)}
.filter-summary-chip-label{opacity:.8}
.filter-summary-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-left:auto}
.filter-summary-toggle{padding:8px 14px;background:#f5f6ff;color:var(--accent);border:1px solid rgba(99,102,241,.24);border-radius:var(--r3);font-family:var(--sn);font-weight:700;font-size:12px;cursor:pointer;transition:border-color .15s,color .15s,box-shadow .15s,background .15s}
.filter-summary-toggle:hover{border-color:var(--accent);background:#eef2ff;box-shadow:0 4px 12px rgba(99,102,241,.12)}
.filter-reset{margin-left:0;padding:6px 4px;background:transparent;color:var(--t3);border:none;border-radius:var(--r3);font-family:var(--sn);font-weight:600;font-size:12px;cursor:pointer;transition:color .15s,opacity .15s}
.filter-reset:hover{color:var(--red)}
.filter-reset:disabled{opacity:.4;cursor:not-allowed}

.ms{position:relative;display:flex;flex-direction:column;gap:6px;min-width:200px;flex:1 1 200px;max-width:280px}
.ms.ms-sale_type_ids{max-width:360px}
.ms.ms-product_group_ids{max-width:340px}
.ms-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;font-weight:700}
.ms-trigger{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r3);cursor:pointer;font-family:var(--sn);font-size:12px;color:var(--t1);font-weight:500;transition:border-color .15s,box-shadow .15s;min-height:38px}
.ms-trigger:hover{border-color:var(--bd2)}
.ms-trigger.active{border-color:var(--accent);background:#f5f6ff}
.ms-trigger.open{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.ms-trigger-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ms-trigger-text.ms-placeholder{color:var(--t3);font-weight:500}
.ms-count{background:var(--accent);color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px;line-height:1}
.ms-arrow{color:var(--t3);font-size:10px;transition:transform .15s}
.ms-trigger.open .ms-arrow{transform:rotate(180deg)}

.ms-pop{position:absolute;top:calc(100% + 4px);left:0;right:auto;width:min(420px,calc(100vw - 32px));background:var(--sf);border:1px solid var(--bd);border-radius:var(--r3);box-shadow:var(--sh3);z-index:40;padding:8px;max-height:380px;display:flex;flex-direction:column;animation:fi .12s ease}
.ms-search{width:100%;padding:8px 10px;border:1px solid var(--bd);border-radius:6px;font-family:var(--sn);font-size:12px;margin-bottom:6px;background:var(--bg2);color:var(--t1)}
.ms-search:focus{outline:none;border-color:var(--accent);background:var(--sf)}
.ms-list{overflow-y:auto;flex:1;margin:0 -2px;padding:0 2px}
.ms-opt{display:flex;align-items:flex-start;gap:8px;padding:8px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--t1);font-weight:500;line-height:1.35;user-select:none}
.ms-opt:hover{background:var(--bg2)}
.ms-opt.on{background:#f5f6ff;color:var(--accent);font-weight:600}
.ms-opt-box{width:14px;height:14px;border:1.5px solid var(--bd);border-radius:3px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--sf);font-size:10px;color:#fff;font-weight:900;line-height:1;margin-top:1px}
.ms-opt.on .ms-opt-box{background:var(--accent);border-color:var(--accent)}
.ms-opt-text{flex:1;min-width:0;overflow:visible;text-overflow:clip;white-space:normal;word-break:break-word}
.ms-empty{padding:20px 10px;text-align:center;color:var(--t3);font-size:12px}
.ms-foot{display:flex;gap:6px;padding-top:6px;border-top:1px solid var(--bd);margin-top:6px}
.ms-foot-btn{flex:1;padding:6px 10px;background:var(--bg2);color:var(--t2);border:none;border-radius:5px;font-family:var(--sn);font-size:11px;font-weight:600;cursor:pointer;transition:background .15s}
.ms-foot-btn:hover{background:var(--bd);color:var(--t1)}

/* ─── Warning panel ──────────────────── */
.warn-panel{background:var(--abg);border:1px solid var(--abd);border-radius:var(--r2);padding:12px 16px;margin-bottom:16px;font-size:12px;color:#78350f;display:flex;gap:10px;align-items:flex-start}
.warn-panel-ico{font-size:16px;flex-shrink:0;line-height:1}
.warn-panel b{font-family:var(--sn);font-weight:700;display:block;margin-bottom:4px;font-size:12px;color:#78350f}
.warn-panel ul{margin:0;padding-left:18px}
.warn-panel li{margin:2px 0;line-height:1.45}
.warn-panel-toggle{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;border:none;background:transparent;color:#78350f;font:inherit;padding:0;cursor:pointer;text-align:left}
.warn-panel-toggle b{margin-bottom:0}
.warn-panel-meta{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:#92400e;white-space:nowrap}
.warn-panel.compact{padding:10px 14px}

.legend{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:20px;box-shadow:var(--sh1);flex-wrap:wrap;font-size:11px;color:var(--t2)}
.legend-title{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-right:4px}
.legend-item{display:inline-flex;align-items:center;gap:5px;font-weight:500}
.legend-item b{font-family:var(--sn);font-weight:700;color:var(--t1)}
.legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.legend-dot.s5{background:#10b981}
.legend-dot.s4{background:#22c55e}
.legend-dot.s3{background:#f59e0b}
.legend-dot.s2{background:#f97316}
.legend-dot.s1{background:#ef4444}
.legend-sep{width:1px;height:14px;background:var(--bd);margin:0 4px}

/* ─── Blocks ────────────────────────────── */
.block{margin-bottom:28px}
.block-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-left:2px}
.block-ico{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.block-ico.b1{background:#ecfdf5;color:#059669}
.block-ico.b2{background:#eff6ff;color:#2563eb}
.block-ico.b3{background:#fef3c7;color:#d97706}
.block-ico.b4{background:#fce7f3;color:#db2777}
.block-ico.b5{background:#ede9fe;color:#7c3aed}
.block-title{font-size:13px;font-weight:700;color:var(--t1);letter-spacing:-.1px}
.block-desc{font-size:11px;color:var(--t3);font-weight:500;margin-left:4px}

/* ─── Card ───────────────────────────────── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px 16px;box-shadow:var(--sh1);position:relative;transition:box-shadow .18s,transform .18s,border-color .18s;animation:fi .35s ease;display:flex;flex-direction:column;height:100%}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card:hover{box-shadow:var(--sh2);transform:translateY(-2px);border-color:var(--bd2);z-index:2}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--bg2);border-radius:var(--r) var(--r) 0 0;pointer-events:none}
.card.s5::before{background:linear-gradient(90deg,#10b981,#34d399)}
.card.s4::before{background:linear-gradient(90deg,#22c55e,#86efac)}
.card.s3::before{background:linear-gradient(90deg,#f59e0b,#fcd34d)}
.card.s2::before{background:linear-gradient(90deg,#f97316,#fdba74)}
.card.s1::before{background:linear-gradient(90deg,#ef4444,#fca5a5)}

.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px;min-height:30px}
.card-label-wrap{display:flex;align-items:flex-start;gap:6px;flex:1;min-height:28px}
.card-label{display:block;font-size:11px;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;line-height:1.35}
.card.compact-label .card-label{font-size:10px;line-height:1.2}
.card-info{width:16px;height:16px;border-radius:50%;background:var(--bg2);color:var(--t3);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:help;flex-shrink:0;transition:background .15s,color .15s;position:relative;font-family:var(--sn);border:1px solid var(--bd)}
.card-info:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.card-tooltip{position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%) translateY(4px);width:min(320px,calc(100vw - 32px));padding:12px 14px;background:#0f172a;color:#f8fafc;border-radius:10px;font-family:var(--sn);font-size:12px;font-weight:500;line-height:1.5;letter-spacing:0;text-transform:none;box-shadow:0 12px 32px rgba(15,23,42,.25);opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;z-index:80;text-align:left;white-space:normal}
.card-tooltip::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#0f172a}
.card-info:hover .card-tooltip{opacity:1;transform:translateX(-50%) translateY(0)}
.card-info.tt-left .card-tooltip{left:0;transform:translateY(4px)}
.card-info.tt-left .card-tooltip::after{left:8px;transform:none}
.card-info.tt-left:hover .card-tooltip{transform:translateY(0)}
.card-info.tt-right .card-tooltip{left:auto;right:0;transform:translateY(4px)}
.card-info.tt-right .card-tooltip::after{left:auto;right:8px;transform:none}
.card-info.tt-right:hover .card-tooltip{transform:translateY(0)}
.card-tooltip b{color:#a5b4fc;font-weight:700}
.card-tooltip .tt-target{display:block;margin-top:8px;padding-top:8px;border-top:1px solid rgba(165,180,252,.2);font-family:var(--mn);font-size:11px;color:#c7d2fe}
.card-tooltip .tt-target b{color:#a5b4fc}
.card-score{display:inline-flex;align-items:center;gap:4px;font-family:var(--sn);font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px;flex-shrink:0}
.card-score.s5{background:var(--gbg);color:var(--grn)}
.card-score.s4{background:#ecfdf5;color:#059669}
.card-score.s3{background:var(--abg);color:var(--amb)}
.card-score.s2{background:#fff7ed;color:#ea580c}
.card-score.s1{background:var(--rbg);color:var(--red)}

.card-value{font-family:var(--mn);font-size:26px;font-weight:700;color:var(--t1);line-height:1.05;letter-spacing:-.5px;margin-bottom:4px}
.card-unit{font-size:12px;color:var(--t3);font-weight:500;margin-left:5px;letter-spacing:0}

.card-sub{font-size:11px;color:var(--t3);font-weight:500;margin-bottom:12px;font-family:var(--mn)}

.card-insight{margin:2px 0 10px;font-size:10px;font-weight:700;line-height:1.45;color:var(--t3)}
.card-insight strong{font-weight:800;color:inherit}
.card-insight.info{color:var(--t3)}
.card-insight.warn{color:var(--amb)}
.card-insight.risk{color:var(--red)}
.card-spark{margin-top:auto;margin-bottom:10px;padding:12px 0 8px;border-bottom:1px solid var(--bd);min-height:62px}
.card-spark-svg{display:block;width:100%;height:42px;overflow:visible}
.card-spark-grid{stroke:rgba(148,163,184,.32);stroke-width:1}
.card-spark-zero{stroke:rgba(15,23,42,.16);stroke-width:1;stroke-dasharray:3 3}
.card-spark-area{fill:rgba(37,99,235,.08)}
.card-spark-line{fill:none;stroke:#2563eb;stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round}
.card-spark-line.good{stroke:#059669}
.card-spark-line.bad{stroke:#dc2626}
.card-spark-dot{stroke:#fff;stroke-width:1.5}
.card-spark-dot.first{fill:#cbd5e1}
.card-spark-dot.last{fill:#2563eb}
.card-spark-dot.last.good{fill:#059669}
.card-spark-dot.last.bad{fill:#dc2626}
.card-spark-meta{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:4px;font-size:9px;color:var(--t3);font-family:var(--mn);text-transform:uppercase;letter-spacing:.4px}

.card-foot{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--bd);gap:8px}
.card-foot-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.card-foot-note{font-size:11px;color:var(--t3);font-weight:600}
.delta{font-family:var(--mn);font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;display:inline-flex;align-items:center;gap:3px}
.delta.up{background:var(--gbg);color:var(--grn)}
.delta.down{background:var(--rbg);color:var(--red)}
.delta.flat{background:var(--bg2);color:var(--t3)}
.delta.inverse-up{background:var(--rbg);color:var(--red)}
.delta.inverse-down{background:var(--gbg);color:var(--grn)}

.card.err{border-color:var(--rbd);background:var(--rbg)}
.card.err .card-value{color:var(--red);font-size:15px}
.card.err::before{background:var(--red)}

/* ─── Empty state / loading ─────────────── */
.empty-state{text-align:center;padding:80px 20px;color:var(--t3)}
.empty-state-ico{font-size:48px;margin-bottom:14px;opacity:.5}
.empty-state-title{font-size:16px;font-weight:700;color:var(--t2);margin-bottom:6px}
.empty-state-sub{font-size:13px;color:var(--t3)}

.loading{padding:60px;text-align:center;color:var(--t3)}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid rgba(99,102,241,.18);border-radius:50%;border-top-color:var(--accent);animation:spin .9s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--t2);font-weight:500}

/* ─── Error panels ──────────────────────── */
.err-panel{background:var(--rbg);border:1px solid var(--rbd);border-radius:var(--r2);padding:14px 18px;margin-bottom:18px;font-size:12px;color:#7f1d1d;font-family:var(--mn)}
.err-panel b{font-family:var(--sn);font-weight:700;display:block;margin-bottom:6px;font-size:13px}
.err-panel ul{margin:4px 0 0 20px}
.err-panel li{margin:3px 0;line-height:1.4}

/* ─── Departments tab ───────────────────── */
.dept-summary{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.dept-summary-item{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r2);padding:12px 14px;box-shadow:var(--sh1);min-width:160px}
.dept-summary-label{font-size:10px;color:var(--t3);font-weight:800;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.dept-summary-value{font-family:var(--mn);font-size:18px;font-weight:700;color:var(--t1)}
.dept-table-wrap{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r2);box-shadow:var(--sh1);overflow:auto}
.dept-table{width:100%;min-width:2200px;border-collapse:separate;border-spacing:0;font-size:12px}
.dept-table.compact-deltas{min-width:1880px}
.dept-table th{position:sticky;top:0;background:var(--sf);z-index:2;text-align:left;color:var(--t3);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.55px;padding:12px 10px;border-bottom:1px solid var(--bd);white-space:nowrap}
.dept-table td{padding:11px 10px;border-bottom:1px solid var(--bd);vertical-align:middle;color:var(--t1);white-space:nowrap}
.dept-table tr:last-child td{border-bottom:none}
.dept-table tbody tr:hover td{background:#f8fafc}
.dept-table .num{text-align:right;font-family:var(--mn);font-weight:600}
.dept-table .rank{width:44px;color:var(--t3);font-family:var(--mn);font-weight:700}
.dept-table .dept-name{font-weight:700;min-width:230px;white-space:normal;line-height:1.3}
.dept-table .muted{display:block;color:var(--t3);font-size:10px;font-weight:600;margin-top:2px}
.dept-table .counterparty-cell,.dept-detail-table .counterparty-cell{white-space:normal;min-width:240px;max-width:420px;line-height:1.35}
.counterparty-list{display:flex;flex-direction:column;gap:6px}
.counterparty-item{display:block}
.counterparty-name{display:block;font-weight:800;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:560px}
.counterparty-metrics{display:flex;flex-wrap:wrap;gap:2px 9px;color:var(--t3);font-size:9.5px;font-weight:600}
.counterparty-metric{white-space:nowrap}
.counterparty-metrics .risk{color:var(--red)}
.counterparty-metrics .good{color:var(--grn)}
.counterparty-empty{color:var(--t3);font-size:10px;font-weight:600}
.counterparty-more{color:var(--t3);font-size:10px;font-weight:700}
.cisp-link{color:inherit;text-decoration:none;border-bottom:1px dotted rgba(79,70,229,.45)}
.cisp-link:hover{color:var(--accent);border-bottom-color:var(--accent)}
.metric-na{color:var(--t3);border-bottom:1px dotted var(--bd2);cursor:help}
.dept-table .risk{color:var(--red)}
.dept-controls{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:10px 0 16px;flex-wrap:wrap}
.dept-note{font-size:11px;color:var(--t3);line-height:1.5}
.dept-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.table-toggle{border:1px solid var(--bd);background:var(--sf);color:var(--t2);border-radius:6px;padding:7px 11px;font-family:var(--sn);font-size:11px;font-weight:800;cursor:pointer;transition:border-color .15s,color .15s,background .15s;white-space:nowrap}
.table-toggle:hover{border-color:var(--accent);color:var(--accent)}
.table-toggle.active{background:#f5f6ff;border-color:var(--accent);color:var(--accent)}
.state-legend{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:10.5px;color:var(--t3)}
.state-legend b{color:var(--t2);font-weight:800}
.dept-table th.has-tip,.dept-detail-table th.has-tip{cursor:help}
.dept-table th.sortable,.dept-detail-table th.sortable{cursor:pointer;user-select:none}
.dept-table th.sortable:hover,.dept-detail-table th.sortable:hover{color:var(--accent);background:#f8fafc}
.sort-mark{display:inline-flex;align-items:center;justify-content:center;margin-left:5px;color:var(--t3);font-size:10px;font-family:var(--sn);letter-spacing:0;text-transform:none}
.sortable.active .sort-mark{color:var(--accent)}
.th-info{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;margin-left:5px;background:var(--bg2);border:1px solid var(--bd);color:var(--t3);font-size:10px;font-weight:900;line-height:1;font-family:var(--sn);text-transform:none;letter-spacing:0;vertical-align:middle}
.dept-table th.has-tip:hover .th-info,.dept-detail-table th.has-tip:hover .th-info{background:var(--accent);border-color:var(--accent);color:#fff}
.branch-table{min-width:1900px}
.dept-main-row{cursor:pointer}
.dept-main-row:hover td{background:#f8fafc}
.dept-expander{font-family:var(--mn);font-weight:900;color:var(--accent);margin-right:6px}
.dept-detail-cell{background:#f8fafc!important;padding:10px 12px!important}
.dept-detail-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.dept-detail-title{font-size:12px;font-weight:800;color:var(--t1);text-transform:uppercase;letter-spacing:.45px}
.dept-detail-sub{font-size:11px;color:var(--t3);font-weight:500;margin-top:2px}
.dept-detail-table{width:100%;border-collapse:separate;border-spacing:0;font-size:11px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r3);overflow:hidden}
.dept-detail-table th{background:var(--sf);color:var(--t3);font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.35px;padding:8px 6px;border-bottom:1px solid var(--bd);white-space:nowrap;text-align:left}
.dept-detail-table td{padding:7px 6px;border-bottom:1px solid var(--bd);white-space:nowrap}
.dept-detail-table tr:last-child td{border-bottom:none}
.dept-detail-table .dept-name{min-width:170px}
.dept-detail-scroll{overflow:auto;max-width:calc(100vw - 92px)}
.detail-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.detail-toggle{border:1px solid var(--bd);background:var(--sf);color:var(--t2);border-radius:6px;padding:7px 11px;font-family:var(--sn);font-size:11px;font-weight:800;cursor:pointer;transition:border-color .15s,color .15s,background .15s}
.detail-toggle:hover{border-color:var(--accent);color:var(--accent)}
.detail-toggle.secondary{background:var(--bg2)}
.detail-pill{display:inline-flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--bd);border-radius:999px;padding:6px 10px;color:var(--t2);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.45px}
.advance-block{margin-top:12px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r3);padding:12px 12px 2px;box-shadow:var(--sh1)}
.advance-block-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.advance-block-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.45px;color:var(--t2)}
.advance-block-sub{font-size:11px;color:var(--t3);line-height:1.45;margin-top:3px}
.advance-block .dept-detail-scroll{max-width:100%}
.status-badge{display:inline-flex;align-items:center;justify-content:center;border-radius:6px;padding:4px 8px;font-size:10px;font-weight:800;white-space:nowrap}
.status-badge.ok{background:var(--gbg);color:var(--grn)}
.status-badge.warn{background:var(--abg);color:var(--amb)}
.status-badge.risk{background:var(--rbg);color:var(--red)}
.status-badge.neutral{background:var(--bg2);color:var(--t3)}
.health-pill{display:inline-flex;align-items:center;justify-content:center;min-width:44px;border-radius:6px;padding:4px 8px;font-family:var(--mn);font-size:12px;font-weight:900}
.health-pill.na{background:var(--bg2);color:var(--t3)}
.health-pill.good{background:var(--gbg);color:var(--grn)}
.health-pill.warn{background:var(--abg);color:var(--amb)}
.health-pill.mid{background:#fff7ed;color:#ea580c}
.health-pill.risk{background:var(--rbg);color:var(--red)}

/* ─── Benchmark highlighting ─────────────── */
.bench-good{background:rgba(5,150,105,.07)}
.bench-bad{background:rgba(220,38,38,.07)}
.dept-table tfoot td{background:var(--bg2);font-weight:700;border-top:2px solid var(--bd2);color:var(--t2);font-size:11px;padding:10px 10px;position:sticky;bottom:0;z-index:1}
.dept-table tfoot .avg-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);font-weight:800}
.bench-legend{display:inline-flex;align-items:center;gap:12px;margin-left:12px;font-size:11px;color:var(--t3);font-weight:500}
.bench-legend-dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:4px;vertical-align:middle}
.bench-legend-dot.good{background:rgba(5,150,105,.35)}
.bench-legend-dot.bad{background:rgba(220,38,38,.35)}

/* ─── Concentration risk panel ────────────── */
.conc-panel{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r2);padding:14px 16px;margin-bottom:16px;box-shadow:var(--sh1)}
.conc-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);margin-bottom:10px}
.conc-grid{display:flex;flex-wrap:wrap;gap:10px}
.conc-card{flex:1;min-width:180px;background:var(--bg2);border-radius:var(--r3);padding:12px 14px;border:1px solid var(--bd)}
.conc-card-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:6px}
.conc-card-value{font-family:var(--mn);font-size:22px;font-weight:700;color:var(--t1);line-height:1.1}
.conc-card-value.conc-high{color:var(--red)}
.conc-card-value.conc-mid{color:var(--amb)}
.conc-card-sub{font-size:10px;color:var(--t3);font-weight:500;margin-top:3px}
.conc-clients{font-size:10px;color:var(--t2);margin-top:6px;line-height:1.4;font-weight:500;border-top:1px solid var(--bd);padding-top:6px}
.savings-panel{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r2);padding:14px 16px;margin-bottom:16px;box-shadow:var(--sh1)}
.savings-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:12px}
.savings-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--t2)}
.savings-sub{font-size:11px;color:var(--t3);font-weight:500;margin-top:3px;line-height:1.4}
.savings-control{display:flex;align-items:center;gap:8px;color:var(--t3);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.45px}
.savings-control input[type=number]{width:82px;border:1px solid var(--bd);border-radius:6px;padding:8px 10px;font-family:var(--mn);font-weight:700;color:var(--t1);background:var(--sf)}
.savings-control input[type=range]{width:150px;accent-color:var(--accent)}
.savings-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.savings-metric{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r3);padding:12px 14px;min-width:0}
.savings-label{font-size:10px;color:var(--t3);font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.savings-value{font-family:var(--mn);font-size:18px;font-weight:800;color:var(--t1)}
.savings-note{font-size:10px;color:var(--t3);font-weight:500;margin-top:3px}

.compare-group{display:flex;flex-direction:column;gap:6px}
.compare-group .preset-chips{padding:3px}
.compare-group .chip{padding:6px 12px}

/* ─── Inventory tab ─────────────────────── */
.stock-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-bottom:14px}
.stock-panel{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r2);box-shadow:var(--sh1);padding:14px 16px;min-width:0}
.stock-panel-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.stock-panel-title-row{display:flex;align-items:center;gap:6px}
.stock-panel-title{font-size:12px;font-weight:800;color:var(--t1);text-transform:uppercase;letter-spacing:.45px}
.stock-panel-sub{font-size:11px;color:var(--t3);font-weight:500;margin-top:2px}
.stock-panel-kpi{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:6px 10px;background:var(--bg2);border:1px solid var(--bd);font-family:var(--mn);font-size:10px;font-weight:800;color:var(--t2);white-space:nowrap}
.bridge-panel{grid-column:1 / -1;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r2);box-shadow:var(--sh1);padding:14px 16px;min-width:0}
.bridge-strip{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:14px}
.bridge-stat{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;min-width:0}
.bridge-stat-label{font-size:10px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.45px;margin-bottom:6px}
.bridge-stat-value{font-family:var(--mn);font-size:14px;font-weight:700;color:var(--t1);line-height:1.2}
.bridge-drivers{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:14px}
.bridge-driver{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;min-width:0}
.bridge-driver-label{font-size:11px;font-weight:800;color:var(--t1);line-height:1.35}
.bridge-driver-value{font-family:var(--mn);font-size:12px;font-weight:700;color:var(--t1);margin-top:6px}
.bridge-driver-meta{font-size:10px;font-weight:600;line-height:1.45;color:var(--t3);margin-top:6px}
.stock-bars{display:flex;flex-direction:column;gap:10px}
.stock-bar-row{display:flex;flex-direction:column;gap:5px}
.stock-bar-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;font-size:12px}
.stock-bar-name{font-weight:700;color:var(--t1);line-height:1.3;overflow:hidden;text-overflow:ellipsis}
.stock-bar-meta{font-family:var(--mn);font-size:11px;color:var(--t2);white-space:nowrap;text-align:right}
.stock-track{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden}
.stock-fill{height:100%;background:linear-gradient(90deg,#10b981,#2563eb);border-radius:4px}
.stock-bar-foot{display:flex;justify-content:space-between;gap:10px;font-size:10px;color:var(--t3);font-family:var(--mn)}
.stock-table{min-width:1320px}
.stock-table-wrap{margin-top:14px}
.stock-status-note{font-size:11px;color:var(--t3);line-height:1.5;margin:8px 0 12px}
.stock-filter-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.stock-filter-title{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;font-weight:700}
.stock-filter-chip{display:inline-flex;align-items:center;gap:8px}
.stock-filter-chip-count{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 6px;border-radius:999px;background:var(--bg2);border:1px solid var(--bd);font-family:var(--mn);font-size:10px;font-weight:700;color:var(--t2)}
.stock-filter-chip.active .stock-filter-chip-count{background:#eef2ff;border-color:#c7d2fe;color:var(--accent)}
.stock-filter-meta{margin-left:auto;font-size:11px;color:var(--t3);font-family:var(--mn);font-weight:600}
.overview-overdue-list{display:flex;flex-direction:column;gap:10px}
.overview-overdue-item{padding:10px 12px;border:1px solid var(--bd);border-radius:var(--r3);background:var(--bg2)}
.overview-overdue-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.overview-overdue-name{font-size:12px;font-weight:800;color:var(--t1);line-height:1.35}
.overview-overdue-value{font-family:var(--mn);font-size:12px;font-weight:800;color:var(--red);white-space:nowrap}
.overview-overdue-meta{display:flex;flex-wrap:wrap;gap:6px 10px;margin-top:6px;font-family:var(--mn);font-size:10px;color:var(--t3)}
.overview-overdue-meta span + span::before{content:"·";margin-right:10px;color:var(--t4)}
.overview-overdue-empty{padding:20px 10px;text-align:center;color:var(--t3);font-size:12px}
.overview-panel-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.overview-panel-tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-left:auto}
.overview-sortbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.overview-sortbar-title{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;font-weight:700}
.overview-sortbar .preset-chips{padding:3px}
.overview-sortbar .chip{padding:6px 12px}
.overview-method-note{margin-top:12px;font-size:11px;color:var(--t3);line-height:1.5}
.overview-method-note.warn{color:#92400e}
.overview-change-panel{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r2);padding:14px 16px;margin-bottom:16px;box-shadow:var(--sh1)}
.overview-change-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.overview-change-ico{width:24px;height:24px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;background:#f5f6ff;border:1px solid rgba(99,102,241,.22);color:var(--accent);font-size:12px;font-weight:800;flex-shrink:0}
.overview-change-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--t2)}
.overview-change-list{margin:0;padding-left:18px;color:var(--t2)}
.overview-change-list li{margin:5px 0;line-height:1.5;font-size:12px}
.overview-change-list strong{font-weight:800;color:var(--t1)}

/* ─── Cash cycle / AR aging ─────────────── */
.cycle-panel{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r2);box-shadow:var(--sh1);padding:16px;margin-bottom:14px}
.cycle-title{font-size:12px;font-weight:800;color:var(--t1);text-transform:uppercase;letter-spacing:.45px;margin-bottom:4px}
.cycle-sub{font-size:11px;color:var(--t3);font-weight:500;margin-bottom:14px}
.wf{display:flex;flex-direction:column;gap:10px}
.wf-row{display:grid;grid-template-columns:150px minmax(120px,1fr) 120px;gap:12px;align-items:center}
.wf-label{font-size:12px;font-weight:800;color:var(--t1)}
.wf-track{height:20px;background:var(--bg2);border-radius:6px;position:relative;overflow:hidden}
.wf-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#2563eb,#10b981)}
.wf-fill.neg{background:linear-gradient(90deg,#f97316,#ef4444)}
.wf-value{font-family:var(--mn);font-size:12px;font-weight:700;color:var(--t1);text-align:right}
.wf-row.total{padding-top:10px;border-top:1px solid var(--bd)}
.wf-row.total .wf-label,.wf-row.total .wf-value{font-size:14px}

@media (max-width:900px){
  .header{padding:18px 20px}
  .header-inner{align-items:flex-start}
  .container{padding:20px}
  .filters{justify-content:flex-start;width:100%}
  .header-actions{width:100%;flex-wrap:wrap;justify-content:flex-start}
  .preset-group{width:100%;min-width:0}
  .preset-label{width:auto}
  .preset-chips{width:100%;overflow-x:auto}
  .chip{flex:0 0 auto}
  .stock-filter-meta{width:100%;margin-left:0}
  .tabs{width:100%}
  .savings-head{flex-direction:column}
  .savings-grid{grid-template-columns:1fr}
  .savings-control{flex-wrap:wrap}
  .stock-grid{grid-template-columns:1fr}
  .bridge-strip,.bridge-drivers{grid-template-columns:1fr}
  .filter-summary{align-items:flex-start}
  .filter-summary-actions{width:100%;margin-left:0}
  .period-compact{align-items:flex-start}

<script>
(function(){
  const host = String(window.location.hostname || "").toLowerCase();
  const params = new URLSearchParams(window.location.search || "");
  const snapshotClientMode = params.get("snapshot") === "1"
    || window.location.protocol === "file:"
    || /\.github\.io$/i.test(host);
  const snapshotBar = document.querySelector(".snapshot-bar");

  window.KPI_GITHUB_SNAPSHOT = snapshotClientMode;
  if (snapshotBar) snapshotBar.classList.toggle("visible", snapshotClientMode);

  const STORE = {
    files: new Map(),
    cache: new Map(),
    ready: false,
    manifest: null,
    folderName: "",
  };
  window.KPI_SNAPSHOT_STORE = STORE;

  const emitSnapshotReady = () => {
    window.dispatchEvent(new CustomEvent("kpi:snapshot-ready", {
      detail: {
        ready: STORE.ready,
        folderName: STORE.folderName,
        manifest: STORE.manifest,
      },
    }));
  };

  if (!snapshotClientMode) {
    emitSnapshotReady();
    return;
  }

  const REQUIRED = [
    "manifest.json",
    "kpi/top.json",
    "kpi/branches.json",
    "kpi/managers.json",
    "kpi/departments.json",
    "kpi/clients.json",
    "kpi/ar-aging.json",
    "kpi/inventory.json",
  ];

  const DICT_MAP = {
    "/api/dict/branches": "dict/branches.json",
    "/api/dict/managers": "dict/managers.json",
    "/api/dict/departments": "dict/departments.json",
    "/api/dict/clients": "dict/clients.json",
    "/api/dict/counterparties": "dict/counterparties.json",
    "/api/dict/sale-types": "dict/sale_types.json",
    "/api/dict/product-groups": "dict/product_groups.json",
    "/api/dict/auction": "dict/auction.json",
  };

  const FILTER_KEYS = ["bu_ids","mol_ids","dept_ids","parole_ids","pred_ids","sale_type_ids","auction_flags","product_group_ids"];
  const DEFAULT_FILTER_KEYS = new Set(["parole_ids","sale_type_ids","product_group_ids"]);

  const statusEl = () => document.getElementById("snapshotStatus");
  const setStatus = (text, cls) => {
    const el = statusEl();
    if (!el) return;
    el.textContent = text;
    el.className = "snapshot-status" + (cls ? " " + cls : "");
  };

  const relPath = (file) => {
    const raw = String(file.webkitRelativePath || file.name || "").replace(/\\/g, "/");
    const parts = raw.split("/").filter(Boolean);
    return parts.length > 1 ? parts.slice(1).join("/") : raw;
  };

  const readFile = (file) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error || new Error("File read error"));
    reader.readAsText(file, "utf-8");
  });

  const readJson = async (path) => {
    if (STORE.cache.has(path)) return STORE.cache.get(path);
    const file = STORE.files.get(path);
    if (!file) throw new Error("В snapshot-папке нет файла: " + path);
    const payload = JSON.parse(await readFile(file));
    STORE.cache.set(path, payload);
    return payload;
  };

  const clone = (payload) => JSON.parse(JSON.stringify(payload || {}));

  const jsonResponse = (payload, status) => new Response(JSON.stringify(payload), {
    status: status || 200,
    headers: {"Content-Type":"application/json; charset=utf-8"},
  });

  const fail = (message, status) => jsonResponse({
    ok: false,
    snapshot_mode: true,
    source: "github-pages",
    error: message,
  }, status || 400);

  const parseIds = (raw) => String(raw || "")
    .split(",")
    .map((x) => Number(String(x).trim()))
    .filter((x) => Number.isFinite(x));

  const sameIdSet = (a, b) => {
    if (a.length !== b.length) return false;
    const aa = [...a].sort((x, y) => x - y);
    const bb = [...b].map(Number).sort((x, y) => x - y);
    return aa.every((v, i) => v === bb[i]);
  };

  const matchesDefaultFilter = (params, key) => {
    const raw = String(params.get(key) || "").trim();
    if (!raw) return false;
    const defaults = STORE.manifest?.default_filters || {};
    const expected = defaults[key] || [];
    return expected.length > 0 && sameIdSet(parseIds(raw), expected);
  };

  const hasFilters = (params, allow) => {
    const allowed = new Set(allow || []);
    return FILTER_KEYS.some((key) => !allowed.has(key) && String(params.get(key) || "").trim());
  };

  const hasUnsupportedFilters = (params, allow) => {
    const allowed = new Set(allow || []);
    return FILTER_KEYS.some((key) => {
      const raw = String(params.get(key) || "").trim();
      if (!raw || allowed.has(key)) return false;
      return !(DEFAULT_FILTER_KEYS.has(key) && matchesDefaultFilter(params, key));
    });
  };

  const hasOnlyDefaultFilters = (params, allow) => {
    const allowed = new Set(allow || []);
    let found = false;
    for (const key of FILTER_KEYS) {
      const raw = String(params.get(key) || "").trim();
      if (!raw || allowed.has(key)) continue;
      if (DEFAULT_FILTER_KEYS.has(key) && matchesDefaultFilter(params, key)) {
        found = true;
        continue;
      }
      return false;
    }
    if (!found) return false;
    const defaults = STORE.manifest?.default_filters || {};
    return Array.from(DEFAULT_FILTER_KEYS).every(
      (key) => !(defaults[key] || []).length || matchesDefaultFilter(params, key)
    );
  };

  const singleValue = (params, key) => {
    const raw = String(params.get(key) || "").trim();
    if (!raw || raw.includes(",")) return null;
    return raw;
  };

  const markSnapshot = (payload) => {
    if (!payload || typeof payload !== "object") return payload;
    payload.snapshot_mode = true;
    payload.source = "github-pages";
    payload.snapshot = {
      folder: STORE.folderName,
      exported_at: STORE.manifest?.exported_at || null,
      period: STORE.manifest?.period || null,
    };
    const period = STORE.manifest?.period || {};
    const warning = period.start && period.end
      ? `GitHub Pages: показан заранее выгруженный snapshot ${period.start} - ${period.end}. Новые периоды и произвольные фильтры без SQL не пересчитываются.`
      : "GitHub Pages: показан заранее выгруженный snapshot. Новые периоды и произвольные фильтры без SQL не пересчитываются.";
    const warnings = Array.isArray(payload.warnings) ? payload.warnings : [];
    if (!warnings.includes(warning)) warnings.unshift(warning);
    payload.warnings = warnings;
    return payload;
  };

  const payloadFor = async (path) => markSnapshot(clone(await readJson(path)));

  const unsupported = () => fail(
    "Этот срез не выгружен в snapshot. В GitHub Pages режиме можно смотреть общий snapshot и заранее экспортированные раскрытия. Для новых фильтров сделайте новую выгрузку или запустите SQL-режим.",
    422
  );

  const dictPayload = async (path, params) => {
    const data = clone(await readJson(path));
    let items = Array.isArray(data.items) ? data.items : [];
    const q = String(params.get("q") || "").trim().toLowerCase();
    if (q) items = items.filter((item) => String(item?.name || "").toLowerCase().includes(q));
    const rawLimit = Number(params.get("limit") || 500);
    const limit = Number.isFinite(rawLimit) ? Math.max(1, Math.min(2000, rawLimit)) : 500;
    return {
      ok: true,
      items: items.slice(0, limit),
      count: Math.min(items.length, limit),
      snapshot_mode: true,
      source: "github-pages",
      period_days: STORE.manifest?.period?.days,
      end: STORE.manifest?.period?.end,
    };
  };

  const kpiPayload = async (endpoint, params) => {
    if (endpoint === "top") {
      const defaultOnly = hasOnlyDefaultFilters(params);
      if (hasUnsupportedFilters(params) || (hasFilters(params) && !defaultOnly)) return unsupported();
      return payloadFor(defaultOnly ? "kpi/default/top.json" : "kpi/top.json");
    }

    if (endpoint === "branches") {
      const defaultOnly = hasOnlyDefaultFilters(params);
      if (hasUnsupportedFilters(params) || (hasFilters(params) && !defaultOnly)) return unsupported();
      return payloadFor(defaultOnly ? "kpi/default/branches.json" : "kpi/branches.json");
    }

    if (endpoint === "departments") {
      const buId = singleValue(params, "bu_ids");
      if (String(params.get("bu_ids") || "").trim() && buId == null) return unsupported();
      const defaultOnly = hasOnlyDefaultFilters(params, ["bu_ids"]);
      if (hasUnsupportedFilters(params, ["bu_ids"]) || (hasFilters(params, ["bu_ids"]) && !defaultOnly)) return unsupported();
      if (buId != null) {
        return payloadFor((defaultOnly ? "details/default_branch_" : "details/branch_") + buId + "_departments.json");
      }
      return payloadFor(defaultOnly ? "kpi/default/departments.json" : "kpi/departments.json");
    }

    if (endpoint === "managers") {
      const defaultOnly = hasOnlyDefaultFilters(params);
      if (hasUnsupportedFilters(params) || (hasFilters(params) && !defaultOnly)) return unsupported();
      return payloadFor(defaultOnly ? "kpi/default/managers.json" : "kpi/managers.json");
    }

    if (endpoint === "clients") {
      const deptId = singleValue(params, "dept_ids");
      const managerId = singleValue(params, "mol_ids");
      if (String(params.get("dept_ids") || "").trim() && deptId == null) return unsupported();
      if (String(params.get("mol_ids") || "").trim() && managerId == null) return unsupported();
      if (deptId != null && managerId != null) return unsupported();
      const defaultOnly = hasOnlyDefaultFilters(params, ["dept_ids", "mol_ids"]);
      if (hasUnsupportedFilters(params, ["dept_ids", "mol_ids"]) || (hasFilters(params, ["dept_ids", "mol_ids"]) && !defaultOnly)) return unsupported();
      if (deptId != null) {
        return payloadFor((defaultOnly ? "details/default_department_" : "details/department_") + deptId + "_clients.json");
      }
      if (managerId != null) {
        return payloadFor((defaultOnly ? "details/default_manager_" : "details/manager_") + managerId + "_clients.json");
      }
      return payloadFor(defaultOnly ? "kpi/default/clients.json" : "kpi/clients.json");
    }

    if (endpoint === "inventory") {
      const defaultOnly = hasOnlyDefaultFilters(params);
      if (hasUnsupportedFilters(params) || (hasFilters(params) && !defaultOnly)) return unsupported();
      return payloadFor(defaultOnly ? "kpi/default/inventory.json" : "kpi/inventory.json");
    }

    if (endpoint === "ar-aging") {
      const defaultOnly = hasOnlyDefaultFilters(params);
      if (hasUnsupportedFilters(params) || (hasFilters(params) && !defaultOnly)) return unsupported();
      return payloadFor(defaultOnly ? "kpi/default/ar-aging.json" : "kpi/ar-aging.json");
    }

    return null;
  };

  const handleApi = async (url) => {
    const path = url.pathname;
    const params = url.searchParams;

    if (path === "/api/ping") {
      return {
        ok: true,
        db: false,
        snapshot_mode: true,
        source: "github-pages",
        folder: STORE.folderName,
        manifest: STORE.manifest,
      };
    }

    if (DICT_MAP[path]) {
      return dictPayload(DICT_MAP[path], params);
    }

    const prefix = "/api/kpi/";
    if (path.startsWith(prefix)) {
      return kpiPayload(path.slice(prefix.length), params);
    }

    return null;
  };

  const nativeFetch = window.fetch.bind(window);
  window.fetch = async function(input, init) {
    const raw = typeof input === "string" ? input : (input && input.url) || "";
    let url;
    try {
      url = new URL(raw, window.location.href);
    } catch (e) {
      return nativeFetch(input, init);
    }

    if (!snapshotClientMode) return nativeFetch(input, init);
    if (!url.pathname.startsWith("/api/")) return nativeFetch(input, init);
    if (!STORE.ready) {
      return fail("Сначала нажмите 'Выбрать папку snapshot' и выберите папку с manifest.json.", 428);
    }

    try {
      const payload = await handleApi(url);
      return payload
        ? jsonResponse(payload)
        : fail("Неизвестный API endpoint в snapshot-режиме: " + url.pathname, 404);
    } catch (e) {
      return fail(e?.message || String(e), 500);
    }
  };

  const loadSnapshotFolder = async (event) => {
    const files = Array.from(event.target?.files || []);
    if (!files.length) return;

    STORE.files.clear();
    STORE.cache.clear();
    STORE.ready = false;
    STORE.manifest = null;

    files.forEach((file) => {
      const path = relPath(file);
      if (path) STORE.files.set(path, file);
    });

    STORE.folderName = (files[0].webkitRelativePath || "snapshot").split("/")[0] || "snapshot";

    const missing = REQUIRED.filter((path) => !STORE.files.has(path));
    if (missing.length) {
      setStatus("Не хватает файлов snapshot: " + missing.slice(0, 3).join(", ") + (missing.length > 3 ? "..." : ""), "err");
      emitSnapshotReady();
      return;
    }

    try {
      STORE.manifest = await readJson("manifest.json");
      STORE.ready = true;
      const period = STORE.manifest?.period || {};
      const periodText = period.start && period.end ? ` · ${period.start}–${period.end}` : "";
      setStatus(`Подключен snapshot: ${STORE.folderName}${periodText}`, "ok");
    } catch (e) {
      STORE.ready = false;
      setStatus("Ошибка чтения snapshot: " + (e?.message || String(e)), "err");
    }
    emitSnapshotReady();
  };

  const input = document.getElementById("snapshotFolderInput");
  if (input) input.addEventListener("change", loadSnapshotFolder);
  setStatus("Выберите snapshot-папку для работы без SQL");
  emitSnapshotReady();
})();
</script>

// ─── Утилиты форматирования ───────────────────────
const fmtRub = (n) => {
  if (n == null || isNaN(n)) return "—";
  const abs = Math.abs(n);
  if (abs >= 1e9) return (n/1e9).toLocaleString("ru-RU",{maximumFractionDigits:2}) + " млрд";
  if (abs >= 1e6) return (n/1e6).toLocaleString("ru-RU",{maximumFractionDigits:2}) + " млн";
  if (abs >= 1e3) return (n/1e3).toLocaleString("ru-RU",{maximumFractionDigits:1}) + " тыс";
  return n.toLocaleString("ru-RU",{maximumFractionDigits:0});
};
const fmtEffectRub = (n) => (n==null||isNaN(n)) ? "—" : (Number(n) > 0 ? "+ " : "") + fmtRub(n);
const fmtDays = (n) => (n==null||isNaN(n)) ? "—" : n.toLocaleString("ru-RU",{maximumFractionDigits:1});
const fmtVal  = (card) => card.unit === "дни" ? fmtDays(card.value) : card.unit === "%" ? fmtQty(card.value) : fmtRub(card.value);
const fmtDelta = (p) => (p==null||isNaN(p)) ? "—" : (p>0?"+":"") + p.toLocaleString("ru-RU",{maximumFractionDigits:1}) + "%";
const fmtPct = (p) => (p==null||isNaN(p)) ? "—" : p.toLocaleString("ru-RU",{maximumFractionDigits:1}) + "%";
const fmtRowcValue = (value, workingCapital) => {
  if (value == null || isNaN(value)) {
    if (workingCapital != null && !isNaN(workingCapital) && Number(workingCapital) <= 0) return "ОК≤0";
    return "—";
  }
  return fmtPct(value);
};
const rowcTitle = (workingCapital) => {
  if (workingCapital == null || isNaN(workingCapital)) return undefined;
  const base = `Оборотный капитал = ${fmtRub(workingCapital)}`;
  return Number(workingCapital) <= 0
    ? `${base}. Бизнес финансируется внешними источниками, ROWC неприменим.`
    : base;
};
const fmtInt = (n) => (n==null||isNaN(n)) ? "—" : Number(n).toLocaleString("ru-RU",{maximumFractionDigits:0});
const fmtQty = (n) => (n==null||isNaN(n)) ? "—" : Number(n).toLocaleString("ru-RU",{maximumFractionDigits:1});
const fmtSignedUnitDelta = (n, unit) => {
  if (n == null || isNaN(n)) return "—";
  const value = Number(n);
  const sign = value > 0 ? "+" : "";
  if (unit === "дни") return `${sign}${fmtDays(value)} дн.`;
  if (unit === "%") return `${sign}${fmtQty(value)} п.п.`;
  return `${sign}${fmtRub(value)} руб`;
};
const fmtRatio = (ratio, ar, margin) => {
  if ((ratio == null || isNaN(ratio)) && Number(ar || 0) <= 0 && Number(margin || 0) > 0) {
    return <span className="metric-na" title="Маржа есть, ДЗ на конец периода нет">—</span>;
  }
  if (ratio == null || isNaN(ratio)) return "—";
  return Number(ratio).toLocaleString("ru-RU",{maximumFractionDigits:2});
};
const fmtScoreDelta = (n) => (n==null||isNaN(n)) ? "—" : (n>0?"+":"") + Number(n).toLocaleString("ru-RU",{maximumFractionDigits:1}) + " п.";
const arrow = (p) => p==null?"":(p>0.05?"↑":p<-0.05?"↓":"→");
const cleanEntityLabel = (value, fallback="Без названия") => {
  const text = String(value || "").replace(/^\+\s*/, "").trim();
  return text || fallback;
};
const fmtDate = (s) => {
  if (!s) return "—";
  const [y,m,d] = s.split("-");
  return d + "." + m + "." + y;
};
const DATE_RE = /^\d{4}-\d{2}-\d{2}$/;
const pad2 = (n) => String(n).padStart(2, "0");
const todayIso = () => {
  const d = new Date();
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
};
const dateValue = (iso) => {
  if (!DATE_RE.test(iso || "")) return NaN;
  const [y,m,d] = iso.split("-").map(Number);
  return Date.UTC(y, m-1, d);
};
const addDaysIso = (iso, days) => new Date(dateValue(iso) + days*86400000).toISOString().slice(0,10);
const EXPORT_SCRIPT_URLS = [
  "https://unpkg.com/html-to-image@1.11.11/dist/html-to-image.js",
  "https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js",
];
const daysInclusive = (start, end) => {
  const startValue = dateValue(start);
  const endValue = dateValue(end);
  if (!Number.isFinite(startValue) || !Number.isFinite(endValue)) return NaN;
  return Math.floor((endValue - startValue) / 86400000) + 1;
};
const loadHtmlToImage = () => {
  if (window.htmlToImage) return Promise.resolve(window.htmlToImage);
  if (window.__KPI_HTML_TO_IMAGE_PROMISE__) return window.__KPI_HTML_TO_IMAGE_PROMISE__;
  window.__KPI_HTML_TO_IMAGE_PROMISE__ = new Promise((resolve, reject) => {
    let idx = 0;
    const tryLoad = () => {
      if (idx >= EXPORT_SCRIPT_URLS.length) {
        reject(new Error("Не удалось загрузить библиотеку экспорта PNG"));
        return;
      }
      const script = document.createElement("script");
      script.src = EXPORT_SCRIPT_URLS[idx];
      script.async = true;
      script.crossOrigin = "anonymous";
      script.onload = () => {
        if (window.htmlToImage) resolve(window.htmlToImage);
        else {
          script.remove();
          idx += 1;
          tryLoad();
        }
      };
      script.onerror = () => {
        script.remove();
        idx += 1;
        tryLoad();
      };
      document.head.appendChild(script);
    };
    tryLoad();
  }).catch((error) => {
    window.__KPI_HTML_TO_IMAGE_PROMISE__ = null;
    throw error;
  });
  return window.__KPI_HTML_TO_IMAGE_PROMISE__;
};
const cispPeriod = (period) => {
  if (!period?.start || !period?.end) return "";
  return `${fmtDate(period.start)}-${fmtDate(period.end)}`;

const cispBuyerStatementUrl = (row, period) => {

  "ar_rub",

const SIGN_ABSOLUTE_DELTA_CARD_IDS = new Set(["ccc_days", "wc_fin_cost_rub", "wci_pct"]);

const metricValue = (value) => {
  const n = Number(value);
  return Number.isFinite(n) ? n : null;
};
const metricDeltaValue = (metric) => {
  const ready = metricValue(metric?.delta_value);
  if (ready != null) return ready;
  const cur = metricValue(metric?.value ?? metric?.current_value);
  const prev = metricValue(metric?.prev_value);
  if (cur == null || prev == null) return null;
  return cur - prev;
};
const metricUnit = (metric) => {
  if (metric?.unit) return metric.unit;
  if (metric?.id === "ccc_days") return "дни";
  return "руб";
};
const shouldUseAbsoluteYoYDelta = (metric, period) => {
  if (period?.compare_mode !== "yoy") return false;
  if (!SIGN_ABSOLUTE_DELTA_CARD_IDS.has(metric?.id)) return false;
  const cur = metricValue(metric?.value ?? metric?.current_value);
  const prev = metricValue(metric?.prev_value);
  if (cur == null || prev == null) return false;
  return cur <= 0 || prev <= 0 || (cur > 0 && prev < 0) || (cur < 0 && prev > 0);
};
const metricTrendValue = (metric, period) => shouldUseAbsoluteYoYDelta(metric, period)
  ? metricDeltaValue(metric)
  : metricValue(metric?.delta_pct);
const fmtMetricDelta = (metric, period) => shouldUseAbsoluteYoYDelta(metric, period)
  ? fmtSignedUnitDelta(metricDeltaValue(metric), metricUnit(metric))
  : fmtDelta(metric?.delta_pct);
const isLowerBetterCard = (card) => card?.lower_better === true || LOWER_BETTER_CARD_IDS.has(card?.id);
const isNeutralTrendCard = (card) => NEUTRAL_TREND_CARD_IDS.has(card?.id);
const isStableHighCEI = (card) => card?.id === "cei_pct" && Number(card?.value) >= 95;

const deltaClass = (card, period) => {
  if (isNeutralTrendCard(card)) return "flat";
  const p = metricTrendValue(card, period);
  if (p == null) return "flat";
  if (Math.abs(p) < 0.01) return "flat";
  if (isStableHighCEI(card) && p < 0) return "flat";
  if (isLowerBetterCard(card)) return p < 0 ? "inverse-down" : "inverse-up";
  return p > 0 ? "up" : "down";
};
const deltaClassRaw = (p, lowerBetter=false) => {
  if (p == null || isNaN(p)) return "flat";
  if (Math.abs(p) < 0.01) return "flat";
  if (lowerBetter) return p < 0 ? "inverse-down" : "inverse-up";
  return p > 0 ? "up" : "down";
};

const compareSortValues = (a, b) => {
  const an = a == null || a === "";
  const bn = b == null || b === "";
  if (an && bn) return 0;
  if (an) return 1;
  if (bn) return -1;
  if (typeof a === "number" && typeof b === "number") return a - b;
  const av = String(a).toLowerCase();
  const bv = String(b).toLowerCase();
  return av.localeCompare(bv, "ru", {numeric:true, sensitivity:"base"});
};

const isAdvanceOnlyRow = (row) => (
  (row?.status_code === "advance_only")
  || (
    Number(row?.revenue_rub || 0) <= 0
    && Number(row?.ar_rub || 0) <= 0
    && Number(row?.overdue_ar_rub || 0) <= 0
    && Number(row?.ar_advance_rub ?? row?.advances_rub ?? 0) > 0
  )
);

const splitAdvanceOnlyRows = (rows) => {
  const main = [];
  const advanceOnly = [];
  (rows || []).forEach((row) => {
    (isAdvanceOnlyRow(row) ? advanceOnly : main).push(row);
  });
  return {main, advanceOnly};
};

const sortRows = (rows, sortState) => {
  const list = [...(rows || [])];
  const key = sortState?.key;
  if (!key) return list;
  const dir = sortState.dir === "asc" ? 1 : -1;
  return list.sort((a, b) => compareSortValues(a?.[key], b?.[key]) * dir);
};

const nextSortState = (prev, key) => ({
  key,
  dir: prev?.key === key && prev?.dir === "desc" ? "asc" : "desc",
});

function useSortedRows(rows, defaultKey="rank", defaultDir="asc") {
  const [sortState, setSortState] = useState({key:defaultKey, dir:defaultDir});
  const sortedRows = useMemo(() => sortRows(rows, sortState), [rows, sortState]);
  const requestSort = useCallback((key) => setSortState(prev => nextSortState(prev, key)), []);
  return {rows:sortedRows, sortState, requestSort};
}

const sortable = (sortState, requestSort, key) => ({sortKey:key, sortState, onSort:requestSort});

// Benchmark: подсветка ячеек относительно среднего по компании
// lowerIsBetter=true для DSO, просрочки; false для маржи, роста
function benchCls(value, avg, lowerIsBetter) {
  if (value == null || avg == null || avg === 0) return "";
  const diff = (value - avg) / Math.abs(avg);
  if (Math.abs(diff) < 0.05) return ""; // мёртвая зона ±5%
  if (lowerIsBetter) return diff < 0 ? "bench-good" : "bench-bad";
  return diff > 0 ? "bench-good" : "bench-bad";
}

function DsoSavingsSimulator({totals, period}) {
  const [days, setDays] = useState(5);
  const periodDays = Math.max(1, Number(period?.days) || 30);
  const rate = Number(period?.rate) || 0;
  const ar = Number(totals?.ar_rub) || 0;
  const revenue = Number(totals?.revenue_rub) || 0;
  const currentDso = totals?.dso_days == null ? null : Number(totals.dso_days);
  const reductionDays = Math.max(0, Math.min(365, Number(days) || 0));
  const dailyRevenue = revenue > 0 ? revenue / periodDays : 0;
  const releasedAr = Math.min(ar, dailyRevenue * reductionDays);
  const periodSaving = releasedAr * rate * periodDays / 365;
  const annualSaving = releasedAr * rate;
  const targetDso = currentDso == null ? null : Math.max(0, currentDso - reductionDays);
  const active = ar > 0 && revenue > 0 && reductionDays > 0;

  return (
    <div className="savings-panel">
      <div className="savings-head">
        <div>
          <div className="savings-title">Потенциал экономии</div>
          <div className="savings-sub">Снижение DSO высвобождает ДЗ: выручка в день × дни снижения, но не больше текущей ДЗ.</div>
        </div>
        <label className="savings-control">
          Снизить DSO на
          <input
            type="number"
            min="0"
            max="365"
            step="1"
            value={days}
            onChange={(e) => setDays(e.target.value)}
          />
          дн.
          <input
            type="range"
            min="0"
            max="90"
            step="1"
            value={Math.min(reductionDays, 90)}
            onChange={(e) => setDays(e.target.value)}
          />
        </label>
      </div>
      <div className="savings-grid">
        <div className="savings-metric">
          <div className="savings-label">Высвободится ДЗ</div>
          <div className="savings-value">{active ? fmtRub(releasedAr) : "—"}</div>
          <div className="savings-note">прямой cash release</div>
        </div>
        <div className="savings-metric">
          <div className="savings-label">Экономия за период</div>
          <div className="savings-value">{active ? fmtRub(periodSaving) : "—"}</div>
          <div className="savings-note">по текущей ставке</div>
        </div>
        <div className="savings-metric">
          <div className="savings-label">Годовой эффект</div>
          <div className="savings-value">{active ? fmtRub(annualSaving) : "—"}</div>
          <div className="savings-note">{fmtPct(rate * 100)} годовых</div>
        </div>
        <div className="savings-metric">
          <div className="savings-label">DSO после</div>
          <div className="savings-value">{targetDso == null ? "—" : fmtDays(targetDso)}</div>
          <div className="savings-note">сейчас {fmtDays(currentDso)}</div>
        </div>
      </div>
    </div>
  );
}

// ─── MultiSelect с поиском ───────────────────────
function MultiSelect({def, value, onChange, dictQuery}) {
  const [open, setOpen] = useState(false);
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(false);
  const [loadError, setLoadError] = useState("");
  const [search, setSearch] = useState("");
  const [loaded, setLoaded] = useState(false);
  const rootRef = useRef(null);
  const searchRef = useRef(null);

  // Загружаем справочник при первом открытии.
  const fetchItems = useCallback(async (q) => {
    setLoading(true);
    setLoadError("");
    try {
      const params = new URLSearchParams(dictQuery || "");
      if (q) params.set("q", q);
      const query = params.toString();
      const url = API + def.endpoint + (query ? `?${query}` : "");
      const r = await fetch(url);
      const j = await r.json();
      if (j.ok) setItems(j.items || []);
      else {
        setLoadError(j.error || "Ошибка загрузки справочника");
        setItems([]);
      }
    } catch (e) {
      console.error("[MS]", def.key, e);
      setLoadError(e.message || String(e));
      setItems([]);
    } finally {
      setLoading(false);
      setLoaded(true);
    }
  }, [def.endpoint, def.key, dictQuery]);

  useEffect(() => {
    setItems([]);
    setLoaded(false);
  }, [dictQuery, def.endpoint]);

  // Открытие поповера — грузим данные один раз.
  useEffect(() => {
    if (open && !loaded) fetchItems("");
    if (open && searchRef.current) setTimeout(() => searchRef.current?.focus(), 10);
  }, [open, loaded, fetchItems]);

  // Debounce-поиск: при изменении search перезапрашиваем (если >= 2 символов или пусто).
  useEffect(() => {
    if (!open) return;
    const t = setTimeout(() => {
      if (search.length === 0 || search.length >= 2) fetchItems(search);
    }, 300);
    return () => clearTimeout(t);
  }, [search, open, fetchItems]);

  // Клик вне поповера — закрываем.
  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => {
      if (rootRef.current && !rootRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, [open]);

  const selectedSet = useMemo(() => new Set(value), [value]);

  const toggle = (id) => {
    const next = selectedSet.has(id)
      ? value.filter(v => v !== id)
      : [...value, id];
    onChange(next);
  };

  const clearAll = () => onChange([]);
  const selectVisible = () => {
    const add = items.filter(i => !selectedSet.has(i.id)).map(i => i.id);
    if (add.length) onChange([...value, ...add]);
  };

  // Текст триггера: "3 выбрано" или имя первого, или placeholder.
  let triggerText;
  if (value.length === 0) {
    triggerText = def.placeholder;
  } else if (value.length === 1) {
    const found = items.find(i => i.id === value[0]);
    triggerText = found ? found.name : `ID ${value[0]}`;
  } else {
    triggerText = `Выбрано: ${value.length}`;
  }

  const triggerCls =
    "ms-trigger" +
    (value.length > 0 ? " active" : "") +
    (open ? " open" : "");

  return (
    <div className={"ms ms-" + def.key} ref={rootRef}>
      <div className="ms-label">{def.label}</div>
      <div className={triggerCls} onClick={() => setOpen(o => !o)}>
        <span className={"ms-trigger-text"+(value.length===0?" ms-placeholder":"")}>{triggerText}</span>
        {value.length > 0 && <span className="ms-count">{value.length}</span>}
        <span className="ms-arrow">▼</span>
      </div>
      {open && (
        <div className="ms-pop" onClick={e => e.stopPropagation()}>
          <input
            ref={searchRef}
            className="ms-search"
            placeholder="Поиск…"
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
          <div className="ms-list">
            {loading && <div className="ms-empty">Загрузка…</div>}
            {!loading && loadError && <div className="ms-empty">Ошибка загрузки</div>}
            {!loading && !loadError && items.length === 0 && <div className="ms-empty">Ничего не найдено</div>}
            {!loading && items.map(it => {
              const on = selectedSet.has(it.id);
              return (
                <div key={it.id}
                     className={"ms-opt"+(on?" on":"")}
                     onClick={() => toggle(it.id)}
                     title={it.name}>
                  <span className="ms-opt-box">{on ? "✓" : ""}</span>
                  <span className="ms-opt-text">{it.name || "—"}</span>
                </div>
              );
            })}
          </div>
          <div className="ms-foot">
            <button className="ms-foot-btn" onClick={selectVisible}>Добавить всё</button>
            <button className="ms-foot-btn" onClick={clearAll}>Очистить</button>
          </div>
        </div>
      )}
    </div>
  );
}

function CardInfo({card, tip, extraTip}) {
  const ref = useRef(null);

    const rect = el.getBoundingClientRect();
    const width = Math.min(320, Math.max(240, window.innerWidth - 32));
    const center = rect.left + rect.width / 2;
    if (center - width / 2 < 16) setEdge("left");
    else if (center + width / 2 > window.innerWidth - 16) setEdge("right");
    else setEdge("center");
  };
  return (
    <span
      ref={ref}
      className={"card-info" + (edge === "center" ? "" : " tt-" + edge)}
      aria-label="Описание"
      onMouseEnter={alignTooltip}
      onFocus={alignTooltip}
    >
      ?

    </span>
  );
}

const Sparkline = React.memo(function Sparkline({card, period}) {
  const spark = useMemo(() => {
    const raw = Array.isArray(card?.sparkline) ? card.sparkline : [];
    const values = raw.map(v => (v == null || isNaN(v) ? null : Number(v)));
    const numeric = values.filter(v => v != null);
    if (numeric.length < 2 || values.length < 2) return null;

    const width = 240;
    const height = 42;
    const padX = 2;
    const padY = 4;
    let min = Math.min(...numeric);
    let max = Math.max(...numeric);
    if (ZERO_LINE_CARD_IDS.has(card?.id)) {
      min = Math.min(min, 0);
      max = Math.max(max, 0);
    }
    if (min === max) {
      const delta = Math.max(Math.abs(min || 1) * 0.08, 1);
      min -= delta;
      max += delta;
    }

    const tone = (() => {
      if (isNeutralTrendCard(card)) return "neutral";
      const numericValues = values.filter(v => v != null);
      if (numericValues.length < 2) return "neutral";
      const first = numericValues[0];
      const last = numericValues[numericValues.length - 1];
      const diff = last - first;
      if (Math.abs(diff) < 1e-9) return "neutral";
      if (isStableHighCEI(card) && diff < 0) return "neutral";
      const good = isLowerBetterCard(card) ? diff < 0 : diff > 0;
      return good ? "good" : "bad";
    })();

    const scaleX = (idx, len) => (len <= 1 ? width / 2 : padX + (idx * (width - padX * 2)) / (len - 1));
    const scaleY = (value) => {
      const ratio = (value - min) / (max - min);
      return height - padY - ratio * (height - padY * 2);
    };
    const zeroY = ZERO_LINE_CARD_IDS.has(card?.id) ? scaleY(0) : null;

    const points = values.map((value, idx) => value == null ? null : {
      x: scaleX(idx, values.length),
      y: scaleY(value),
      value,
    });
    const validPoints = points.filter(Boolean);
    if (validPoints.length < 2) return null;

    const line = validPoints.map((pt, idx) => `${idx === 0 ? "M" : "L"} ${pt.x.toFixed(2)} ${pt.y.toFixed(2)}`).join(" ");
    const area = `${line} L ${validPoints[validPoints.length - 1].x.toFixed(2)} ${(height - 2).toFixed(2)} L ${validPoints[0].x.toFixed(2)} ${(height - 2).toFixed(2)} Z`;
    const midY = ((height - padY * 2) / 2 + padY).toFixed(2);

    return {
      tone,
      line,
      area,
      first: validPoints[0],
      last: validPoints[validPoints.length - 1],
      midY,
      zeroY,
      pointsCount: values.length,
    };
  }, [card]);

  if (!spark) return null;

  const title = period
    ? `Тренд внутри периода ${fmtDate(period.start)} — ${fmtDate(period.end)}`
    : "Тренд внутри периода";
  const lineCls = "card-spark-line" + (spark.tone === "good" ? " good" : spark.tone === "bad" ? " bad" : "");
  const dotCls = "card-spark-dot last" + (spark.tone === "good" ? " good" : spark.tone === "bad" ? " bad" : "");

  return (
    <div className="card-spark" title={title}>
      <svg className="card-spark-svg" viewBox="0 0 240 42" preserveAspectRatio="none" aria-hidden="true">
        <line className="card-spark-grid" x1="0" y1={spark.midY} x2="240" y2={spark.midY}/>
        {spark.zeroY == null ? null : <line className="card-spark-zero" x1="0" y1={spark.zeroY} x2="240" y2={spark.zeroY}/>}
        <path className="card-spark-area" d={spark.area}/>
        <path className={lineCls} d={spark.line}/>
        <circle className="card-spark-dot first" cx={spark.first.x} cy={spark.first.y} r="3.2"/>
        <circle className={dotCls} cx={spark.last.x} cy={spark.last.y} r="3.6"/>
      </svg>
      <div className="card-spark-meta">
        <span>Тренд</span>
        <span>{spark.pointsCount} точ.</span>
      </div>
    </div>
  );
});

function OverviewAgingPanel({data, loading, err, overviewArRub=null, salesOnlyFiltersActive=false}) {
  const [sortMode, setSortMode] = useState("amount");
  const totals = data?.totals || {};
  const rows = useMemo(() => {
    const list = ((data?.top_clients) || []).filter(r => (r.overdue_rub || 0) > 0);
    list.sort((a, b) => {
      if (sortMode === "age") {
        return compareSortValues(b?.max_overdue_days, a?.max_overdue_days)
          || compareSortValues(b?.overdue_rub, a?.overdue_rub);
      }
      if (sortMode === "term_90") {
        return compareSortValues(b?.d_90_plus_rub, a?.d_90_plus_rub)
          || compareSortValues(b?.max_overdue_days, a?.max_overdue_days)
          || compareSortValues(b?.overdue_rub, a?.overdue_rub);
      }
      return compareSortValues(b?.overdue_rub, a?.overdue_rub)
        || compareSortValues(b?.max_overdue_days, a?.max_overdue_days);
    });
    return list.slice(0, 5);
  }, [data, sortMode]);
  const overviewArGap = useMemo(() => {
    const topAr = Number(overviewArRub);
    const agingAr = Number(totals?.ar_rub);
    if (!Number.isFinite(topAr) || !Number.isFinite(agingAr)) return null;
    const diff = agingAr - topAr;
    const absDiff = Math.abs(diff);
    const threshold = Math.max(1_000_000, Math.abs(topAr) * 0.01);
    if (absDiff < threshold) return null;
    return {
      diff,
      absDiff,
      reason: salesOnlyFiltersActive
        ? "Разница объясняется продажными фильтрами: верхняя карточка ДЗ их учитывает, а FIFO-aging нет, потому что в R_DBT_BOOK нет такого разреза."
        : "Методика должна совпадать с верхней карточкой ДЗ; если разница сохраняется, расчёт стоит перепроверить."
    };
  }, [overviewArRub, totals, salesOnlyFiltersActive]);
  const agingTitleTip = salesOnlyFiltersActive
    ? "Aging на overview считается так же, как во вкладке «ДЗ»: по открытым FIFO-остаткам, а не по обороту продаж. Если включены фильтры типа продажи, аукциона или товарной группы, суммы могут отличаться от верхней карточки ДЗ: FIFO-остатки этого разреза не хранят."
    : "Aging на overview считается так же, как во вкладке «ДЗ»: по открытым FIFO-остаткам, а не по обороту продаж.";

  if (!loading && !data && !err) return null;

  return (
    <div className="block">
      <div className="block-head">
        <div className="block-ico b2">⏱</div>
        <div className="block-title">Фокус по дебиторке</div>
        <div className="block-desc">· ageing buckets и top-5 просрочки без перехода во вкладку</div>
      </div>

      {err && !data && (
        <div className="err-panel"><b>Ошибка AR ageing:</b> {err}</div>
      )}

      {loading && !data && (
        <div className="stock-panel">
          <div className="loading" style={{padding:"26px 10px"}}>
            <div className="spinner"></div>
            <div className="loading-text">Подтягиваю ageing ДЗ для главной панели…</div>
          </div>
        </div>
      )}

      {data && (
        <>
          <div className="stock-grid">
            <StockBars
              title="Aging ДЗ на дату"
              sub="Открытая FIFO-дебиторка по срокам оплаты"
              rows={data.buckets}
              labelKey="bucket_label"
              countKey="client_count"
              countLabel="клиентов"
              titleTip={agingTitleTip}
            />

            <div className="stock-panel">
              <div className="overview-panel-head">
                <div>
                  <div className="stock-panel-title">Top-5 в просрочку</div>
                  <div className="stock-panel-sub">Кто формирует просроченную ДЗ прямо сейчас</div>
                </div>
                <div className="overview-panel-tools">
                  {totals.top5_overdue_share_pct != null && (
                    <div className="stock-panel-kpi">{fmtPct(totals.top5_overdue_share_pct)} просрочки</div>
                  )}

              </div>

              <div className="overview-sortbar">
                <div className="overview-sortbar-title">Сортировка</div>
                <div className="preset-chips">
                  {OVERVIEW_OVERDUE_SORTS.map((opt) => (
