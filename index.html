      </div>
    );
  }
  if (err) {
    return <div className="err-panel"><b>Ошибка расчёта запасов:</b> {err}</div>;
  }
  if (!data) {
    return (
      <div className="empty-state">
        <div className="empty-state-ico">▥</div>
        <div className="empty-state-title">Нажмите «Рассчитать», чтобы увидеть структуру запасов</div>
        <div className="empty-state-sub">Разбивка покажет, где именно заморожены деньги</div>
      </div>
    );
  }

  const totals = data.totals || {};
  const topSku = sortedTopSku;

  return (
    <>
      {data.warnings && data.warnings.length > 0 && (
        <div className="warn-panel">
          <span className="warn-panel-ico">!</span>
          <div style={{flex:1}}>
            <b>Методика запасов:</b>
            <ul>{data.warnings.map((w,i) => <li key={i}>{w}</li>)}</ul>
          </div>
        </div>
      )}

      {data.errors && data.errors.length > 0 && (
        <div className="err-panel">
          <b>Часть складских показателей не рассчиталась:</b>
          <ul>{data.errors.map((e,i) => <li key={i}>{e}</li>)}</ul>
        </div>
      )}

      <div className="dept-summary">
        <div className="dept-summary-item">
          <div className="dept-summary-label">Запасы</div>
          <div className="dept-summary-value">{fmtRub(totals.inventory_rub)}</div>
        </div>
        <div className="dept-summary-item">
          <div className="dept-summary-label">SKU</div>
          <div className="dept-summary-value">{fmtInt(totals.sku_count)}</div>
        </div>
        <div className="dept-summary-item">
          <div className="dept-summary-label">Складов</div>
          <div className="dept-summary-value">{fmtInt(totals.bunk_count)}</div>
        </div>
        <div className="dept-summary-item">
          <div className="dept-summary-label">Slow 90+</div>
          <div className="dept-summary-value">{fmtRub(totals.slow_90_rub)}</div>
        </div>
        <div className="dept-summary-item">
          <div className="dept-summary-label">Неликвид 180+</div>
          <div className="dept-summary-value">{fmtRub(totals.dead_180_rub)}</div>
        </div>
        <div className="dept-summary-item">
          <div className="dept-summary-label">Без цены</div>
          <div className="dept-summary-value">{fmtInt(totals.zero_cost_rows)}</div>
        </div>
      </div>

      <div className="stock-grid">
        <StockBars
          title="Сырьё / упаковка / товары"
          sub="Коммерческие остатки после исключения ТМЦ и ОС"
          rows={data.buckets}
          labelKey="bucket"
        />
        <StockBars
          title="Товарные группы"
          sub="Где лежит основной денежный запас"
          rows={data.groups}
          labelKey="parent_group_name"
        />
      </div>

      <div className="stock-grid">
        <StockBars
          title="Категории"
          sub="Классификация из справочника товаров"
          rows={data.categories}
          labelKey="category_name"
        />
        <StockBars
          title="Склады"
          sub="ТОП складов по сумме остатка"
          rows={data.warehouses}
          labelKey="bunk_name"
        />
      </div>

      <div className="stock-status-note">
        ТОП SKU отсортирован по замороженным деньгам. Slow 90+ означает, что за последние 90 дней по текущему остатку не было расхода; неликвид 180+ — не было расхода 180 дней.
      </div>

      <div className="dept-table-wrap stock-table-wrap">
        <table className="dept-table stock-table">
          <thead>
            <tr>
              <Th {...sortable(sortState, requestSort, "rank")}>#</Th>
              <Th {...sortable(sortState, requestSort, "tov_name")}>SKU</Th>
              <Th {...sortable(sortState, requestSort, "bucket")}>Бакет</Th>
              <Th {...sortable(sortState, requestSort, "parent_group_name")}>Группа</Th>
              <Th className="num" tip={COL_TIPS.stockValue} {...sortable(sortState, requestSort, "value_rub")}>Остаток, руб</Th>
              <Th className="num" tip={COL_TIPS.stockShare} {...sortable(sortState, requestSort, "share_pct")}>Доля</Th>
              <Th className="num" tip={COL_TIPS.qty} {...sortable(sortState, requestSort, "qty_end")}>Кол-во</Th>
              <Th className="num" tip={COL_TIPS.warehouses} {...sortable(sortState, requestSort, "bunk_count")}>Складов</Th>
              <Th className="num" tip={COL_TIPS.out90} {...sortable(sortState, requestSort, "out_qty_90")}>Расход 90д</Th>
              <Th tip={COL_TIPS.lastOut} {...sortable(sortState, requestSort, "last_out_date")}>Последний расход</Th>
              <Th tip={COL_TIPS.stockStatus} {...sortable(sortState, requestSort, "stock_status")}>Статус</Th>
            </tr>
          </thead>
          <tbody>
            {topSku.length === 0 && (
              <tr><td colSpan="11" style={{textAlign:"center",color:"var(--t3)",padding:"28px"}}>Нет SKU с остатками</td></tr>
            )}
            {topSku.map((r, i) => (
              <tr key={r.tov_id || i}>
                <td className="rank">{i + 1}</td>
                <td className="dept-name">{r.tov_name || "Без товара"}</td>
                <td>{r.bucket || "—"}</td>
                <td>{r.parent_group_name || "—"}</td>
                <td className="num">{fmtRub(r.value_rub)}</td>
                <td className="num">{fmtPct(r.share_pct)}</td>
                <td className="num">{fmtQty(r.qty_end)}</td>
                <td className="num">{fmtInt(r.bunk_count)}</td>
                <td className="num">{fmtQty(r.out_qty_90)}</td>
                <td>
                  {r.last_out_date ? fmtDate(r.last_out_date) : "нет расхода"}
                  <span className="muted">{r.days_since_last_out == null ? "—" : fmtDays(r.days_since_last_out) + " дн. назад"}</span>
                </td>
                <td>
                  <span className={"status-badge " + stockStatusClass(r.stock_status)}>{r.stock_status || "—"}</span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </>
  );
}

// ─── Главный компонент ──────────────────────────
function App() {
  const [preset, setPreset] = useState("m");    // активный чип
  const [customEnd, setCustomEnd] = useState(() => todayIso());
  const [customStart, setCustomStart] = useState(() => addDaysIso(todayIso(), -29));
  const [rate, setRate] = useState(24);         // процентов годовых
  const [activeTab, setActiveTab] = useState("overview");
  const [data, setData] = useState(null);
  const [branchData, setBranchData] = useState(null);
  const [deptData, setDeptData] = useState(null);
  const [clientData, setClientData] = useState(null);
  const [inventoryData, setInventoryData] = useState(null);
  const [arAgingData, setArAgingData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [branchLoading, setBranchLoading] = useState(false);
  const [deptLoading, setDeptLoading] = useState(false);
  const [clientLoading, setClientLoading] = useState(false);
  const [inventoryLoading, setInventoryLoading] = useState(false);
  const [arAgingLoading, setArAgingLoading] = useState(false);
  const [err, setErr] = useState(null);
  const [branchErr, setBranchErr] = useState(null);
  const [deptErr, setDeptErr] = useState(null);
  const [clientErr, setClientErr] = useState(null);
  const [inventoryErr, setInventoryErr] = useState(null);
  const [arAgingErr, setArAgingErr] = useState(null);
  const [autoReloadEnabled, setAutoReloadEnabled] = useState(false);
  const lastLoadedKeyRef = useRef(null);
  const branchLoadedKeyRef = useRef(null);
  const deptLoadedKeyRef = useRef(null);
  const clientLoadedKeyRef = useRef(null);
  const inventoryLoadedKeyRef = useRef(null);
  const arAgingLoadedKeyRef = useRef(null);
  const requestSeqRef = useRef(0);
  const branchSeqRef = useRef(0);
  const deptSeqRef = useRef(0);
  const clientSeqRef = useRef(0);
  const inventorySeqRef = useRef(0);
  const arAgingSeqRef = useRef(0);
  const defaultFiltersRef = useRef(makeEmptyFilters());
  const [defaultFiltersLoading, setDefaultFiltersLoading] = useState(false);

  // Состояние фильтров: {mol_ids:[], dept_ids:[], parole_ids:[], pred_ids:[]}
  const [filters, setFilters] = useState(() => makeEmptyFilters());

  const setFilter = (key, val) => setFilters(f => ({...f, [key]: val}));
  const resetFilters = () => {
    setFilters({...makeEmptyFilters(), ...defaultFiltersRef.current});
  };
  const filtersActive = useMemo(
    () => FILTER_DEFS.some(f => (filters[f.key] || []).length > 0),
    [filters]
  );

  const customPeriodDays = useMemo(() => daysInclusive(customStart, customEnd), [customStart, customEnd]);
  const customPeriodInvalid = preset === "cst" && (!Number.isFinite(customPeriodDays) || customPeriodDays < 1);
  const customPeriodError = !customPeriodInvalid
    ? null
    : Number.isFinite(customPeriodDays)
      ? "дата начала позже даты окончания."
      : "заполните обе даты периода.";
  const effectiveDays = useMemo(() => {
    if (preset === "cst") return customPeriodInvalid ? 1 : customPeriodDays;
    return PRESETS.find(p => p.id===preset)?.days || 30;
  }, [preset, customPeriodDays, customPeriodInvalid]);
  const effectiveEnd = preset === "cst" && !customPeriodInvalid ? customEnd : null;

  const requestKey = useMemo(() => {
    const parts = [`period_days=${effectiveDays}`, `rate=${rate/100}`];
    if (effectiveEnd) parts.push(`end=${effectiveEnd}`);
    FILTER_DEFS.forEach(f => {
      const ids = filters[f.key];
      if (ids && ids.length) parts.push(`${f.key}=${ids.join(",")}`);
    });
    return parts.join("&");
  }, [effectiveDays, effectiveEnd, rate, filters]);

  const dictQuery = useMemo(() => {
    const parts = [`period_days=${effectiveDays}`];
    if (effectiveEnd) parts.push(`end=${effectiveEnd}`);
    return parts.join("&");
  }, [effectiveDays, effectiveEnd]);
  useEffect(() => {
    const onSnapshotReady = (ev) => {
      const p = ev.detail?.period || {};
      if (p.start && p.end) {
        setPreset("cst");
        setCustomStart(p.start);
        setCustomEnd(p.end);
      }
      if (p.rate != null && !isNaN(Number(p.rate))) {
        setRate(Math.round(Number(p.rate) * 1000) / 10);
      }
      const empty = {};
      FILTER_DEFS.forEach(f => { empty[f.key] = []; });
      setFilters(empty);
      setData(null); setBranchData(null); setDeptData(null); setClientData(null); setInventoryData(null); setArAgingData(null);
      setErr(null); setBranchErr(null); setDeptErr(null); setClientErr(null); setInventoryErr(null); setArAgingErr(null);
      lastLoadedKeyRef.current = null;
      branchLoadedKeyRef.current = null;
      deptLoadedKeyRef.current = null;
      clientLoadedKeyRef.current = null;
      inventoryLoadedKeyRef.current = null;
      arAgingLoadedKeyRef.current = null;
      setActiveTab("overview");
      setAutoReloadEnabled(true);
    };
    window.addEventListener("kpi-snapshot-ready", onSnapshotReady);
    return () => window.removeEventListener("kpi-snapshot-ready", onSnapshotReady);
  }, []);

  useEffect(() => {
    if (window.KPI_GITHUB_SNAPSHOT && !window.KPI_SNAPSHOT_STORE?.ready) return;

    let cancelled = false;
    const sameIds = (a=[], b=[]) => {
      if (a.length !== b.length) return false;
      const aa = [...a].map(Number).sort((x,y) => x-y);
      const bb = [...b].map(Number).sort((x,y) => x-y);
      return aa.every((v, i) => v === bb[i]);
    };

    const loadDefaultFilters = async () => {
      setDefaultFiltersLoading(true);
      const nextDefaults = makeEmptyFilters();
      for (const def of FILTER_DEFS) {
        const rule = DEFAULT_FILTER_RULES[def.key];
        if (!rule) continue;
        try {
          const params = new URLSearchParams(dictQuery || "");
          params.set("limit", "5000");
          const url = API + def.endpoint + "?" + params.toString();
          const r = await fetch(url);
          const j = await r.json();
          if (!j.ok) continue;
          nextDefaults[def.key] = (j.items || [])
            .filter(item => !rule.exclude(item))
            .map(item => item.id);
        } catch (e) {
          console.warn("[KPI default filters]", def.key, e);
        }
      }
      if (cancelled) return;
      const prevDefaults = defaultFiltersRef.current || makeEmptyFilters();
      defaultFiltersRef.current = nextDefaults;
      setFilters(prev => {
        const next = {...prev};
        Object.keys(DEFAULT_FILTER_RULES).forEach(key => {
          const cur = prev[key] || [];
          const oldDefault = prevDefaults[key] || [];
          if (cur.length === 0 || sameIds(cur, oldDefault)) {
            next[key] = nextDefaults[key] || [];
          }
        });
        return next;
      });
      setDefaultFiltersLoading(false);
    };

    loadDefaultFilters();
    return () => {
      cancelled = true;
      setDefaultFiltersLoading(false);
    };
  }, [dictQuery]);

  const loadBranches = useCallback(async () => {
    if (customPeriodInvalid) {
      setBranchErr(customPeriodError);
      return;
    }
    const seq = ++branchSeqRef.current;
    setBranchLoading(true);
    setBranchErr(null);
    const url = `${API}/kpi/branches?${requestKey}`;
    console.log("[KPI branches] fetch:", url);
    try {
      const r = await fetch(url);
      const j = await r.json();
      console.log("[KPI branches] payload:", j);
      if (seq !== branchSeqRef.current) return;
      if (!j.ok) throw new Error(j.error || "Неизвестная ошибка");
      setBranchData(j);
      branchLoadedKeyRef.current = requestKey;
    } catch (e) {
      if (seq !== branchSeqRef.current) return;
      console.error("[KPI branches] fetch error:", e);
      setBranchErr(e.message || String(e));
    } finally {
      if (seq === branchSeqRef.current) setBranchLoading(false);
    }
  }, [requestKey, customPeriodInvalid, customPeriodError]);

  const loadDepartments = useCallback(async () => {
    if (customPeriodInvalid) {
      setDeptErr(customPeriodError);
      return;
    }
    const seq = ++deptSeqRef.current;
    setDeptLoading(true);
    setDeptErr(null);
    const url = `${API}/kpi/departments?${requestKey}`;
    console.log("[KPI departments] fetch:", url);
    try {
      const r = await fetch(url);
      const j = await r.json();
      console.log("[KPI departments] payload:", j);
      if (seq !== deptSeqRef.current) return;
      if (!j.ok) throw new Error(j.error || "Неизвестная ошибка");
      setDeptData(j);
      deptLoadedKeyRef.current = requestKey;
    } catch (e) {
      if (seq !== deptSeqRef.current) return;
      console.error("[KPI departments] fetch error:", e);
      setDeptErr(e.message || String(e));
    } finally {
      if (seq === deptSeqRef.current) setDeptLoading(false);
    }
  }, [requestKey, customPeriodInvalid, customPeriodError]);

  const loadClients = useCallback(async () => {
    if (customPeriodInvalid) {
      setClientErr(customPeriodError);
      return;
    }
    const seq = ++clientSeqRef.current;
    setClientLoading(true);
    setClientErr(null);
    const url = `${API}/kpi/clients?${requestKey}`;
    console.log("[KPI clients] fetch:", url);
    try {
      const r = await fetch(url);
      const j = await r.json();
      console.log("[KPI clients] payload:", j);
      if (seq !== clientSeqRef.current) return;
      if (!j.ok) throw new Error(j.error || "Неизвестная ошибка");
      setClientData(j);
      clientLoadedKeyRef.current = requestKey;
    } catch (e) {
      if (seq !== clientSeqRef.current) return;
      console.error("[KPI clients] fetch error:", e);
      setClientErr(e.message || String(e));
    } finally {
      if (seq === clientSeqRef.current) setClientLoading(false);
    }
  }, [requestKey, customPeriodInvalid, customPeriodError]);

  const loadInventory = useCallback(async () => {
    if (customPeriodInvalid) {
      setInventoryErr(customPeriodError);
      return;
    }
    const seq = ++inventorySeqRef.current;
    setInventoryLoading(true);
    setInventoryErr(null);
    const url = `${API}/kpi/inventory?${requestKey}`;
    console.log("[KPI inventory] fetch:", url);
    try {
      const r = await fetch(url);
      const j = await r.json();
      console.log("[KPI inventory] payload:", j);
      if (seq !== inventorySeqRef.current) return;
      if (!j.ok) throw new Error(j.error || "Неизвестная ошибка");
      setInventoryData(j);
      inventoryLoadedKeyRef.current = requestKey;
    } catch (e) {
      if (seq !== inventorySeqRef.current) return;
      console.error("[KPI inventory] fetch error:", e);
      setInventoryErr(e.message || String(e));
    } finally {
      if (seq === inventorySeqRef.current) setInventoryLoading(false);
    }
  }, [requestKey, customPeriodInvalid, customPeriodError]);

  const loadArAging = useCallback(async () => {
    if (customPeriodInvalid) {
      setArAgingErr(customPeriodError);
      return;
    }
    const seq = ++arAgingSeqRef.current;
    setArAgingLoading(true);
    setArAgingErr(null);
    const url = `${API}/kpi/ar-aging?${requestKey}`;
    console.log("[KPI AR aging] fetch:", url);
    try {
      const r = await fetch(url);
      const j = await r.json();
      console.log("[KPI AR aging] payload:", j);
      if (seq !== arAgingSeqRef.current) return;
      if (!j.ok) throw new Error(j.error || "Неизвестная ошибка");
      setArAgingData(j);
      arAgingLoadedKeyRef.current = requestKey;
    } catch (e) {
      if (seq !== arAgingSeqRef.current) return;
      console.error("[KPI AR aging] fetch error:", e);
      setArAgingErr(e.message || String(e));
    } finally {
      if (seq === arAgingSeqRef.current) setArAgingLoading(false);
    }
  }, [requestKey, customPeriodInvalid, customPeriodError]);

  const load = useCallback(async () => {
    if (customPeriodInvalid) {
      setErr(customPeriodError);
      return;
    }
    const seq = ++requestSeqRef.current;
    lastLoadedKeyRef.current = requestKey;
    setAutoReloadEnabled(true);
    setLoading(true); setErr(null);
    const url = `${API}/kpi/top?${requestKey}`;
    console.log("[KPI] fetch:", url);
    try {
      const r = await fetch(url);
      const j = await r.json();
      console.log("[KPI] payload:", j);
      if (seq !== requestSeqRef.current) return;
      if (!j.ok) throw new Error(j.error || "Неизвестная ошибка");
      setData(j);
    } catch (e) {
      if (seq !== requestSeqRef.current) return;
      console.error("[KPI] fetch error:", e);
      setErr(e.message || String(e));
    } finally {
      if (seq === requestSeqRef.current) setLoading(false);
    }
  }, [requestKey, customPeriodInvalid, customPeriodError]);

  const downloadHtml = useCallback(() => {
    if (customPeriodInvalid) return;
    if (window.KPI_GITHUB_SNAPSHOT) {
      alert("В GitHub Pages режиме HTML уже открыт как статическая страница. Для другого периода выберите другую snapshot-папку.");
      return;
    }
    window.location.href = `${API}/export/dashboard.html?${requestKey}`;
  }, [requestKey, customPeriodInvalid]);

  useEffect(() => {
    if (!autoReloadEnabled) return;
    if (customPeriodInvalid) return;
    if (lastLoadedKeyRef.current === requestKey) return;
    const t = setTimeout(() => load(), 450);
    return () => clearTimeout(t);
  }, [autoReloadEnabled, filtersActive, customPeriodInvalid, requestKey, load]);

  useEffect(() => {
    if (activeTab !== "branches") return;
    if (!data) return;
    if (customPeriodInvalid) return;
    if (branchLoading) return;
    if (branchLoadedKeyRef.current === requestKey) return;
    const t = setTimeout(() => loadBranches(), 120);
    return () => clearTimeout(t);
  }, [activeTab, data, customPeriodInvalid, branchLoading, requestKey, loadBranches]);

  useEffect(() => {
    if (activeTab !== "departments") return;
    if (!data) return;
    if (customPeriodInvalid) return;
    if (deptLoading) return;
    if (deptLoadedKeyRef.current === requestKey) return;
    const t = setTimeout(() => loadDepartments(), 120);
    return () => clearTimeout(t);
  }, [activeTab, data, customPeriodInvalid, deptLoading, requestKey, loadDepartments]);

  useEffect(() => {
    if (activeTab !== "clients") return;
    if (!data) return;
    if (customPeriodInvalid) return;
    if (clientLoading) return;
    if (clientLoadedKeyRef.current === requestKey) return;
    const t = setTimeout(() => loadClients(), 120);
    return () => clearTimeout(t);
  }, [activeTab, data, customPeriodInvalid, clientLoading, requestKey, loadClients]);

  useEffect(() => {
    if (activeTab !== "inventory") return;
    if (!data) return;
    if (customPeriodInvalid) return;
    if (inventoryLoading) return;
    if (inventoryLoadedKeyRef.current === requestKey) return;
    const t = setTimeout(() => loadInventory(), 120);
    return () => clearTimeout(t);
  }, [activeTab, data, customPeriodInvalid, inventoryLoading, requestKey, loadInventory]);

  useEffect(() => {
    if (activeTab !== "ar-aging") return;
    if (!data) return;
    if (customPeriodInvalid) return;
    if (arAgingLoading) return;
    if (arAgingLoadedKeyRef.current === requestKey) return;
    const t = setTimeout(() => loadArAging(), 120);
    return () => clearTimeout(t);
  }, [activeTab, data, customPeriodInvalid, arAgingLoading, requestKey, loadArAging]);

  // Строим индекс карточек по id (для быстрого доступа по блокам).
  const cardMap = useMemo(() => {
    const m = {};
    (data?.cards || []).forEach(c => { m[c.id] = c; });
    return m;
  }, [data]);
  const visibleBranchData = branchLoadedKeyRef.current === requestKey ? branchData : null;
  const visibleDeptData = deptLoadedKeyRef.current === requestKey ? deptData : null;
  const visibleClientData = clientLoadedKeyRef.current === requestKey ? clientData : null;
  const visibleInventoryData = inventoryLoadedKeyRef.current === requestKey ? inventoryData : null;
  const visibleArAgingData = arAgingLoadedKeyRef.current === requestKey ? arAgingData : null;

  return (
    <>
      <header className="header">
        <div className="header-inner">
          <div className="brand">
            <div className="brand-logo">KPI</div>
            <div className="brand-text">
              <div className="brand-title">Cash Flow Dashboard</div>
              <div className="brand-sub">Этап 1 · Верхняя панель</div>
            </div>
          </div>
          <div className="filters">
            <div className="preset-group">
              <div className="preset-label">Период</div>
              <div className="preset-chips">
                {PRESETS.map(p => (
                  <button key={p.id}
                          className={"chip"+(preset===p.id?" active":"")}
                          onClick={()=>setPreset(p.id)}>
                    {p.label}
                  </button>
                ))}
              </div>
            </div>
            {preset==="cst" && (
              <>
                <div className="fld date">
                  <label>Дата с</label>
                  <input type="date" value={customStart}
                         onChange={e=>setCustomStart(e.target.value)}/>
                </div>
                <div className="fld date">
                  <label>Дата по</label>
                  <input type="date" value={customEnd}
                         onChange={e=>setCustomEnd(e.target.value)}/>
                </div>
              </>
            )}
            <div className="fld">
              <label>Ставка, % годовых</label>
              <input type="number" min="0" max="100" step="0.5" value={rate}
                     onChange={e=>setRate(Math.max(0, parseFloat(e.target.value)||0))}/>
            </div>
            <button className="btn-primary" onClick={load} disabled={loading || customPeriodInvalid || defaultFiltersLoading}>
              {loading ? "Считаю…" : defaultFiltersLoading ? "Фильтры…" : "Рассчитать"}
            </button>
            <button className="btn-secondary" onClick={downloadHtml} disabled={customPeriodInvalid}>
              Скачать HTML
            </button>
          </div>
        </div>
      </header>

      <div className="container">
        <div className="tabs">
          <button className={"tab-btn" + (activeTab==="overview" ? " active" : "")}
                  onClick={() => setActiveTab("overview")}>
            Общая панель
          </button>
          <button className={"tab-btn" + (activeTab==="branches" ? " active" : "")}
                  onClick={() => setActiveTab("branches")}>
            По БЕ
          </button>
          <button className={"tab-btn" + (activeTab==="departments" ? " active" : "")}
                  onClick={() => setActiveTab("departments")}>
            По отделам
          </button>
          <button className={"tab-btn" + (activeTab==="clients" ? " active" : "")}
                  onClick={() => setActiveTab("clients")}>
            Клиенты
          </button>
          <button className={"tab-btn" + (activeTab==="ar-aging" ? " active" : "")}
                  onClick={() => setActiveTab("ar-aging")}>
            ДЗ
          </button>
          <button className={"tab-btn" + (activeTab==="inventory" ? " active" : "")}
                  onClick={() => setActiveTab("inventory")}>
            Запасы
          </button>
          <button className={"tab-btn" + (activeTab==="cycle" ? " active" : "")}
                  onClick={() => setActiveTab("cycle")}>
            Цикл
          </button>
        </div>

        <div className="filter-bar">
          <div className="filter-bar-title">Фильтры</div>
          {FILTER_DEFS.map(def => (
            <MultiSelect key={def.key}
                         def={def}
                         value={filters[def.key]}
                         onChange={v => setFilter(def.key, v)}
                         dictQuery={dictQuery}/>
          ))}
          <button className="filter-reset"
                  onClick={resetFilters}
                  disabled={!filtersActive}>
            Сбросить
          </button>
        </div>

        {data?.period && (
          <div className="period-info">
            <div className="period-info-item">
              <div className="period-info-label">Период</div>
              <div className="period-info-value">{fmtDate(data.period.start)} — {fmtDate(data.period.end)} ({data.period.days} дн.)</div>
            </div>
            <div className="period-info-sep"/>
            <div className="period-info-item">
              <div className="period-info-label">Сравнение с</div>
              <div className="period-info-value">{fmtDate(data.period.prev_start)} — {fmtDate(data.period.prev_end)}</div>
            </div>
            <div className="period-info-sep"/>
            <div className="period-info-item">
              <div className="period-info-label">Ставка фин.</div>
              <div className="period-info-value">{(data.period.rate*100).toFixed(1)}% годовых</div>
            </div>
          </div>
        )}

        {activeTab === "overview" && data && <ScoreLegend/>}

        {err && <div className="err-panel"><b>Ошибка запроса:</b> {err}</div>}
        {customPeriodInvalid && <div className="err-panel"><b>Некорректный период:</b> {customPeriodError}</div>}

        {activeTab === "overview" && data?.warnings && data.warnings.length > 0 && (
          <div className="warn-panel">
            <span className="warn-panel-ico">⚠</span>
            <div style={{flex:1}}>
              <b>Применены фильтры — обратите внимание:</b>
              <ul>{data.warnings.map((w,i) => <li key={i}>{w}</li>)}</ul>
            </div>
          </div>
        )}

        {activeTab === "overview" && data?.errors && data.errors.length > 0 && (
          <div className="err-panel">
            <b>Часть показателей не рассчиталась:</b>
            <ul>{data.errors.map((e,i) => <li key={i}>{e}</li>)}</ul>
          </div>
        )}

        {activeTab === "overview" && loading && (
          <div className="loading">
            <div className="spinner"></div>
            <div className="loading-text">Считаю KPI за {effectiveDays} дн. Это может занять до 30 секунд…</div>
          </div>
        )}

        {activeTab === "overview" && !loading && !data && !err && (
          <div className="empty-state">
            <div className="empty-state-ico">📊</div>
            <div className="empty-state-title">Выберите период и нажмите «Рассчитать»</div>
            <div className="empty-state-sub">Можно выбрать один из пресетов или задать свой диапазон дат</div>
          </div>
        )}

        {activeTab === "overview" && !loading && data && BLOCKS.map(block => (
          <div key={block.id} className="block">
            <div className="block-head">
              <div className={"block-ico "+block.icoClass}>{block.ico}</div>
              <div className="block-title">{block.title}</div>
              <div className="block-desc">· {block.desc}</div>
            </div>
            <div className="grid">
              {block.cards.map(bc => {
                const c = cardMap[bc.id];
                if (!c) return null;
                return <Card key={bc.id} card={c} sub={bc.sub} tip={bc.tip}/>;
              })}
            </div>
          </div>
        ))}

        {activeTab === "branches" && (
          <BranchView
            data={visibleBranchData}
            loading={loading || branchLoading}
            err={branchErr || (!data && err ? err : null)}
            requestKey={requestKey}
          />
        )}

        {activeTab === "departments" && (
          <DepartmentView
            data={visibleDeptData}
            loading={loading || deptLoading}
            err={deptErr || (!data && err ? err : null)}
            requestKey={requestKey}
          />
        )}

        {activeTab === "clients" && (
          <ClientView
            data={visibleClientData}
            loading={loading || clientLoading}
            err={clientErr || (!data && err ? err : null)}
          />
        )}

        {activeTab === "ar-aging" && (
          <ArAgingView
            data={visibleArAgingData}
            loading={loading || arAgingLoading}
            err={arAgingErr || (!data && err ? err : null)}
          />
        )}

        {activeTab === "inventory" && (
          <InventoryView
            data={visibleInventoryData}
            loading={loading || inventoryLoading}
            err={inventoryErr || (!data && err ? err : null)}
          />
        )}

        {activeTab === "cycle" && (
          <CycleView
            data={data}
            loading={loading}
            err={err}
          />
        )}
      </div>
    </>
  );
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  window.__BOOT_OK = true;
  console.log("[KPI] React mounted");
} catch (e) {
  console.error("[KPI] Mount failed:", e);
  document.getElementById("root").innerHTML =
    '<div style="padding:24px;color:#b91c1c;font-family:system-ui;">Mount failed: ' + e.message + '</div>';
}
</script>
</body>
</html>
