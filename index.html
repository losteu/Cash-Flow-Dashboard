<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KPI Cash Flow — Дашборд</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js'"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js'"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js'"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap');

:root{
  --bg:#f4f5f9; --bg2:#eef0f5;
  --sf:#ffffff;
  --bd:#e3e6ee; --bd2:#d7dbe6;
  --t1:#0f172a; --t2:#475569; --t3:#94a3b8; --t4:#cbd5e1;

  --accent:#6366f1; --accent2:#8b5cf6;
  --grad:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);

  --red:#dc2626; --rbg:#fef2f2; --rbd:#fecaca;
  --grn:#059669; --gbg:#ecfdf5; --gbd:#a7f3d0;
  --amb:#d97706; --abg:#fffbeb; --abd:#fde68a;
  --blu:#2563eb; --bbg:#eff6ff; --bbd:#bfdbfe;
  --slt:#64748b; --sbg:#f8fafc; --sbd:#e2e8f0;

  --mn:'JetBrains Mono',ui-monospace,monospace;
  --sn:'Inter',system-ui,-apple-system,sans-serif;

  --sh1:0 1px 2px rgba(15,23,42,.04);
  --sh2:0 4px 16px rgba(15,23,42,.06);
  --sh3:0 10px 32px rgba(15,23,42,.10);
  --r:14px; --r2:10px; --r3:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body,#root{font-family:var(--sn);background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ─── Header ─────────────────────────────── */
.header{background:var(--sf);border-bottom:1px solid var(--bd);padding:22px 32px 26px;position:sticky;top:0;z-index:20;box-shadow:var(--sh1)}
.header-inner{display:flex;align-items:center;gap:24px;flex-wrap:wrap;max-width:1640px;margin:0 auto}

.brand{display:flex;align-items:center;gap:12px}
.brand-logo{width:38px;height:38px;border-radius:10px;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;box-shadow:0 4px 12px rgba(99,102,241,.3)}
.brand-text{display:flex;flex-direction:column;line-height:1.1}
.brand-title{font-size:16px;font-weight:800;color:var(--t1);letter-spacing:-.3px}
.brand-sub{font-size:11px;color:var(--t3);font-weight:500;text-transform:uppercase;letter-spacing:.6px;margin-top:2px}

/* ─── Filters ────────────────────────────── */
.filters{display:flex;gap:18px;align-items:flex-end;flex:1;justify-content:flex-end;flex-wrap:wrap}

.preset-group{display:flex;flex-direction:column;gap:6px}
.preset-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;font-weight:700}
.preset-chips{display:flex;gap:6px;background:var(--bg2);padding:4px;border-radius:10px;border:1px solid var(--bd)}
.chip{padding:7px 14px;border:none;background:transparent;font-family:var(--sn);font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;border-radius:6px;transition:all .15s;white-space:nowrap}
.chip:hover{color:var(--t1)}
.chip.active{background:var(--sf);color:var(--accent);box-shadow:var(--sh1)}

.fld{display:flex;flex-direction:column;gap:6px}
.fld label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;font-weight:700}
.fld input{padding:9px 12px;border:1px solid var(--bd);border-radius:var(--r3);font-family:var(--mn);font-size:13px;font-weight:600;width:110px;background:var(--sf);color:var(--t1);transition:border-color .15s,box-shadow .15s}
.fld.date input{width:145px}
.fld input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.15)}

.btn-primary{padding:10px 22px;background:var(--grad);color:#fff;border:none;border-radius:var(--r3);font-weight:700;cursor:pointer;font-size:13px;font-family:var(--sn);transition:transform .1s,box-shadow .15s;box-shadow:0 4px 12px rgba(99,102,241,.25);height:40px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(99,102,241,.35)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-secondary{padding:10px 16px;background:var(--sf);color:var(--t2);border:1px solid var(--bd);border-radius:var(--r3);font-weight:700;cursor:pointer;font-size:13px;font-family:var(--sn);height:40px;transition:border-color .15s,color .15s,box-shadow .15s}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);box-shadow:0 4px 12px rgba(15,23,42,.06)}
.btn-secondary:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}

/* ─── Container ──────────────────────────── */
.container{max-width:1640px;margin:0 auto;padding:28px 32px 56px}

.period-info{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:20px;box-shadow:var(--sh1);flex-wrap:wrap}
.period-info-item{display:flex;flex-direction:column;gap:2px}
.period-info-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;font-weight:700}
.period-info-value{font-family:var(--mn);font-size:12px;color:var(--t1);font-weight:600}
.period-info-sep{width:1px;height:24px;background:var(--bd)}

/* ─── Tabs ──────────────────────────────── */
.tabs{display:flex;gap:6px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:4px;margin-bottom:16px;width:max-content;max-width:100%;overflow-x:auto}
.tab-btn{border:none;background:transparent;color:var(--t2);font-family:var(--sn);font-size:12px;font-weight:700;padding:9px 16px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:background .15s,color .15s,box-shadow .15s}
.tab-btn:hover{color:var(--t1)}
.tab-btn.active{background:var(--sf);color:var(--accent);box-shadow:var(--sh1)}

/* ─── Multi-select фильтры ────────────── */
.filter-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;padding:14px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:16px;box-shadow:var(--sh1)}
.filter-bar-title{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;font-weight:700;margin-right:2px;align-self:center}
.filter-reset{margin-left:auto;padding:8px 14px;background:var(--bg2);color:var(--t2);border:1px solid var(--bd);border-radius:var(--r3);font-family:var(--sn);font-weight:600;font-size:12px;cursor:pointer;transition:all .15s}
.filter-reset:hover{background:var(--rbg);color:var(--red);border-color:var(--rbd)}
.filter-reset:disabled{opacity:.4;cursor:not-allowed}

.ms{position:relative;display:flex;flex-direction:column;gap:6px;min-width:200px;flex:1 1 200px;max-width:280px}
.ms.ms-sale_type_ids{max-width:360px}
.ms.ms-product_group_ids{max-width:340px}
.ms-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;font-weight:700}
.ms-trigger{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r3);cursor:pointer;font-family:var(--sn);font-size:12px;color:var(--t1);font-weight:500;transition:border-color .15s,box-shadow .15s;min-height:38px}
.ms-trigger:hover{border-color:var(--bd2)}
.ms-trigger.active{border-color:var(--accent);background:#f5f6ff}
.ms-trigger.open{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.ms-trigger-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ms-trigger-text.ms-placeholder{color:var(--t3);font-weight:500}
.ms-count{background:var(--accent);color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px;line-height:1}
.ms-arrow{color:var(--t3);font-size:10px;transition:transform .15s}
.ms-trigger.open .ms-arrow{transform:rotate(180deg)}

.ms-pop{position:absolute;top:calc(100% + 4px);left:0;right:auto;width:min(420px,calc(100vw - 32px));background:var(--sf);border:1px solid var(--bd);border-radius:var(--r3);box-shadow:var(--sh3);z-index:40;padding:8px;max-height:380px;display:flex;flex-direction:column;animation:fi .12s ease}
.ms-search{width:100%;padding:8px 10px;border:1px solid var(--bd);border-radius:6px;font-family:var(--sn);font-size:12px;margin-bottom:6px;background:var(--bg2);color:var(--t1)}
.ms-search:focus{outline:none;border-color:var(--accent);background:var(--sf)}
.ms-list{overflow-y:auto;flex:1;margin:0 -2px;padding:0 2px}
.ms-opt{display:flex;align-items:flex-start;gap:8px;padding:8px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--t1);font-weight:500;line-height:1.35;user-select:none}
.ms-opt:hover{background:var(--bg2)}
.ms-opt.on{background:#f5f6ff;color:var(--accent);font-weight:600}
.ms-opt-box{width:14px;height:14px;border:1.5px solid var(--bd);border-radius:3px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--sf);font-size:10px;color:#fff;font-weight:900;line-height:1;margin-top:1px}
.ms-opt.on .ms-opt-box{background:var(--accent);border-color:var(--accent)}
.ms-opt-text{flex:1;min-width:0;overflow:visible;text-overflow:clip;white-space:normal;word-break:break-word}
.ms-empty{padding:20px 10px;text-align:center;color:var(--t3);font-size:12px}
.ms-foot{display:flex;gap:6px;padding-top:6px;border-top:1px solid var(--bd);margin-top:6px}
.ms-foot-btn{flex:1;padding:6px 10px;background:var(--bg2);color:var(--t2);border:none;border-radius:5px;font-family:var(--sn);font-size:11px;font-weight:600;cursor:pointer;transition:background .15s}
.ms-foot-btn:hover{background:var(--bd);color:var(--t1)}

/* ─── Warning panel ──────────────────── */
.warn-panel{background:var(--abg);border:1px solid var(--abd);border-radius:var(--r2);padding:12px 16px;margin-bottom:16px;font-size:12px;color:#78350f;display:flex;gap:10px;align-items:flex-start}
.warn-panel-ico{font-size:16px;flex-shrink:0;line-height:1}
.warn-panel b{font-family:var(--sn);font-weight:700;display:block;margin-bottom:4px;font-size:12px;color:#78350f}
.warn-panel ul{margin:0;padding-left:18px}
.warn-panel li{margin:2px 0;line-height:1.45}

.legend{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:20px;box-shadow:var(--sh1);flex-wrap:wrap;font-size:11px;color:var(--t2)}
.legend-title{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-right:4px}
.legend-item{display:inline-flex;align-items:center;gap:5px;font-weight:500}
.legend-item b{font-family:var(--sn);font-weight:700;color:var(--t1)}
.legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.legend-dot.s5{background:#10b981}
.legend-dot.s4{background:#22c55e}
.legend-dot.s3{background:#f59e0b}
.legend-dot.s2{background:#f97316}
.legend-dot.s1{background:#ef4444}
.legend-sep{width:1px;height:14px;background:var(--bd);margin:0 4px}

/* ─── Blocks ────────────────────────────── */
.block{margin-bottom:28px}
.block-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-left:2px}
.block-ico{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.block-ico.b1{background:#ecfdf5;color:#059669}
.block-ico.b2{background:#eff6ff;color:#2563eb}
.block-ico.b3{background:#fef3c7;color:#d97706}
.block-ico.b4{background:#fce7f3;color:#db2777}
.block-ico.b5{background:#ede9fe;color:#7c3aed}
.block-title{font-size:13px;font-weight:700;color:var(--t1);letter-spacing:-.1px}
.block-desc{font-size:11px;color:var(--t3);font-weight:500;margin-left:4px}

/* ─── Card ───────────────────────────────── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px 16px;box-shadow:var(--sh1);position:relative;transition:box-shadow .18s,transform .18s,border-color .18s;animation:fi .35s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card:hover{box-shadow:var(--sh2);transform:translateY(-2px);border-color:var(--bd2);z-index:2}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--bg2);border-radius:var(--r) var(--r) 0 0;pointer-events:none}
.card.s5::before{background:linear-gradient(90deg,#10b981,#34d399)}
.card.s4::before{background:linear-gradient(90deg,#22c55e,#86efac)}
.card.s3::before{background:linear-gradient(90deg,#f59e0b,#fcd34d)}
.card.s2::before{background:linear-gradient(90deg,#f97316,#fdba74)}
.card.s1::before{background:linear-gradient(90deg,#ef4444,#fca5a5)}

.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px}
.card-label-wrap{display:flex;align-items:center;gap:6px;flex:1}
.card-label{font-size:11px;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;line-height:1.35}
.card-info{width:16px;height:16px;border-radius:50%;background:var(--bg2);color:var(--t3);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:help;flex-shrink:0;transition:background .15s,color .15s;position:relative;font-family:var(--sn);border:1px solid var(--bd)}
.card-info:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.card-tooltip{position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%) translateY(4px);width:min(320px,calc(100vw - 32px));padding:12px 14px;background:#0f172a;color:#f8fafc;border-radius:10px;font-family:var(--sn);font-size:12px;font-weight:500;line-height:1.5;letter-spacing:0;text-transform:none;box-shadow:0 12px 32px rgba(15,23,42,.25);opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;z-index:80;text-align:left;white-space:normal}
.card-tooltip::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#0f172a}
.card-info:hover .card-tooltip{opacity:1;transform:translateX(-50%) translateY(0)}
.card-info.tt-left .card-tooltip{left:0;transform:translateY(4px)}
.card-info.tt-left .card-tooltip::after{left:8px;transform:none}
.card-info.tt-left:hover .card-tooltip{transform:translateY(0)}
.card-info.tt-right .card-tooltip{left:auto;right:0;transform:translateY(4px)}
.card-info.tt-right .card-tooltip::after{left:auto;right:8px;transform:none}
.card-info.tt-right:hover .card-tooltip{transform:translateY(0)}
.card-tooltip b{color:#a5b4fc;font-weight:700}
.card-tooltip .tt-target{display:block;margin-top:8px;padding-top:8px;border-top:1px solid rgba(165,180,252,.2);font-family:var(--mn);font-size:11px;color:#c7d2fe}
.card-tooltip .tt-target b{color:#a5b4fc}
.card-score{display:inline-flex;align-items:center;gap:4px;font-family:var(--sn);font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px;flex-shrink:0}
.card-score.s5{background:var(--gbg);color:var(--grn)}
.card-score.s4{background:#ecfdf5;color:#059669}
.card-score.s3{background:var(--abg);color:var(--amb)}
.card-score.s2{background:#fff7ed;color:#ea580c}
.card-score.s1{background:var(--rbg);color:var(--red)}

.card-value{font-family:var(--mn);font-size:26px;font-weight:700;color:var(--t1);line-height:1.05;letter-spacing:-.5px;margin-bottom:4px}
.card-unit{font-size:12px;color:var(--t3);font-weight:500;margin-left:5px;letter-spacing:0}

.card-sub{font-size:11px;color:var(--t3);font-weight:500;margin-bottom:12px;font-family:var(--mn)}

.card-foot{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--bd);gap:8px}
.card-foot-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.delta{font-family:var(--mn);font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;display:inline-flex;align-items:center;gap:3px}
.delta.up{background:var(--gbg);color:var(--grn)}
.delta.down{background:var(--rbg);color:var(--red)}
.delta.flat{background:var(--bg2);color:var(--t3)}
.delta.inverse-up{background:var(--rbg);color:var(--red)}
.delta.inverse-down{background:var(--gbg);color:var(--grn)}

.card.err{border-color:var(--rbd);background:var(--rbg)}
.card.err .card-value{color:var(--red);font-size:15px}
.card.err::before{background:var(--red)}

/* ─── Empty state / loading ─────────────── */
.empty-state{text-align:center;padding:80px 20px;color:var(--t3)}
.empty-state-ico{font-size:48px;margin-bottom:14px;opacity:.5}
.empty-state-title{font-size:16px;font-weight:700;color:var(--t2);margin-bottom:6px}
.empty-state-sub{font-size:13px;color:var(--t3)}

.loading{padding:60px;text-align:center;color:var(--t3)}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid rgba(99,102,241,.18);border-radius:50%;border-top-color:var(--accent);animation:spin .9s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--t2);font-weight:500}

/* ─── Error panels ──────────────────────── */
.err-panel{background:var(--rbg);border:1px solid var(--rbd);border-radius:var(--r2);padding:14px 18px;margin-bottom:18px;font-size:12px;color:#7f1d1d;font-family:var(--mn)}
.err-panel b{font-family:var(--sn);font-weight:700;display:block;margin-bottom:6px;font-size:13px}
.err-panel ul{margin:4px 0 0 20px}
.err-panel li{margin:3px 0;line-height:1.4}

/* ─── Departments tab ───────────────────── */
.dept-summary{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.dept-summary-item{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r2);padding:12px 14px;box-shadow:var(--sh1);min-width:160px}
.dept-summary-label{font-size:10px;color:var(--t3);font-weight:800;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.dept-summary-value{font-family:var(--mn);font-size:18px;font-weight:700;color:var(--t1)}
.dept-table-wrap{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r2);box-shadow:var(--sh1);overflow:auto}
.dept-table{width:100%;min-width:1480px;border-collapse:separate;border-spacing:0;font-size:12px}
.dept-table th{position:sticky;top:0;background:var(--sf);z-index:2;text-align:left;color:var(--t3);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.55px;padding:12px 10px;border-bottom:1px solid var(--bd);white-space:nowrap}
.dept-table td{padding:11px 10px;border-bottom:1px solid var(--bd);vertical-align:middle;color:var(--t1);white-space:nowrap}
.dept-table tr:last-child td{border-bottom:none}
.dept-table tbody tr:hover td{background:#f8fafc}
.dept-table .num{text-align:right;font-family:var(--mn);font-weight:600}
.dept-table .rank{width:44px;color:var(--t3);font-family:var(--mn);font-weight:700}
.dept-table .dept-name{font-weight:700;min-width:230px;white-space:normal;line-height:1.3}
.dept-table .muted{display:block;color:var(--t3);font-size:10px;font-weight:600;margin-top:2px}
.dept-table .risk{color:var(--red)}
.dept-table th.has-tip,.dept-detail-table th.has-tip{cursor:help}
.dept-table th.sortable,.dept-detail-table th.sortable{cursor:pointer;user-select:none}
.dept-table th.sortable:hover,.dept-detail-table th.sortable:hover{color:var(--accent);background:#f8fafc}
.sort-mark{display:inline-flex;align-items:center;justify-content:center;margin-left:5px;color:var(--t3);font-size:10px;font-family:var(--sn);letter-spacing:0;text-transform:none}
.sortable.active .sort-mark{color:var(--accent)}

<script>
(function(){
  window.KPI_GITHUB_SNAPSHOT = true;
  const STORE = {files:new Map(), cache:new Map(), ready:false, manifest:null, folderName:""};
  window.KPI_SNAPSHOT_STORE = STORE;
  const REQUIRED = ["manifest.json","kpi/top.json","kpi/branches.json","kpi/departments.json","kpi/clients.json","kpi/ar-aging.json","kpi/inventory.json"];
  const DICT_MAP = {
    "/api/dict/branches":"dict/branches.json",
    "/api/dict/managers":"dict/managers.json",
    "/api/dict/departments":"dict/departments.json",
    "/api/dict/clients":"dict/clients.json",
    "/api/dict/counterparties":"dict/counterparties.json",
    "/api/dict/sale-types":"dict/sale_types.json",
    "/api/dict/product-groups":"dict/product_groups.json",
    "/api/dict/auction":"dict/auction.json"
  };
  const FILTER_KEYS = ["bu_ids","mol_ids","dept_ids","parole_ids","pred_ids","sale_type_ids","product_group_ids","auction_flags"];
  const statusEl = () => document.getElementById("snapshotStatus");
  const setStatus = (text, cls) => {
    const el = statusEl();
    if (!el) return;
    el.textContent = text;
    el.className = "snapshot-status" + (cls ? " " + cls : "");
  };
  const relPath = (file) => {
    const p = String(file.webkitRelativePath || file.name || "").replace(/\\/g,"/");
    const parts = p.split("/").filter(Boolean);
    return parts.length > 1 ? parts.slice(1).join("/") : p;
  };
  const readFile = (file) => new Promise((resolve,reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(r.error || new Error("File read error"));
    r.readAsText(file, "utf-8");
  });
  const readJson = async (path) => {
    if (STORE.cache.has(path)) return STORE.cache.get(path);
    const file = STORE.files.get(path);
    if (!file) throw new Error("В snapshot-папке нет файла: " + path);
    const payload = JSON.parse(await readFile(file));
    STORE.cache.set(path, payload);
    return payload;
  };
  const clone = (payload) => JSON.parse(JSON.stringify(payload || {}));
  const jsonResponse = (payload, status) => new Response(JSON.stringify(payload), {
    status: status || 200,
    headers: {"Content-Type":"application/json; charset=utf-8"}
  });
  const fail = (message, status) => jsonResponse({ok:false, snapshot_mode:true, source:"github-pages", error:message}, status || 400);
  const DEFAULT_FILTER_KEYS = ["sale_type_ids","product_group_ids"];
  const parseIds = (raw) => String(raw || "")
    .split(",")
    .map(x => Number(String(x).trim()))
    .filter(x => Number.isFinite(x));
  const sameIdSet = (a, b) => {
    if (a.length !== b.length) return false;
    const aa = [...a].sort((x,y) => x-y);
    const bb = [...b].map(Number).sort((x,y) => x-y);
    return aa.every((v, i) => v === bb[i]);
  };
  const matchesDefaultFilter = (params, key) => {
    const raw = String(params.get(key) || "").trim();
    if (!raw) return false;
    const defaults = STORE.manifest?.default_filters || {};
    const expected = defaults[key] || [];
    return expected.length > 0 && sameIdSet(parseIds(raw), expected);
  };
  const hasFilters = (params, allow) => {
    const allowed = new Set(allow || []);
    return FILTER_KEYS.some(k => !allowed.has(k) && String(params.get(k) || "").trim());
  };
  const hasUnsupportedFilters = (params, allow) => {
    const allowed = new Set(allow || []);
    return FILTER_KEYS.some(k => {
      const raw = String(params.get(k) || "").trim();
      if (!raw || allowed.has(k)) return false;
      return !(DEFAULT_FILTER_KEYS.includes(k) && matchesDefaultFilter(params, k));
    });
  };
  const hasOnlyDefaultFilters = (params, allow) => {
    const allowed = new Set(allow || []);
    let found = false;
    for (const k of FILTER_KEYS) {
      const raw = String(params.get(k) || "").trim();
      if (!raw || allowed.has(k)) continue;
      if (DEFAULT_FILTER_KEYS.includes(k) && matchesDefaultFilter(params, k)) {
        found = true;
        continue;
      }
      return false;
    }
    if (!found) return false;
    const defaults = STORE.manifest?.default_filters || {};
    return DEFAULT_FILTER_KEYS.every(k => !(defaults[k] || []).length || matchesDefaultFilter(params, k));
  };
  const singleValue = (params, key) => {
    const raw = String(params.get(key) || "").trim();
    if (!raw || raw.includes(",")) return null;
    return raw;
  };
  const withNotice = (payload) => {
    const p = clone(payload);
    p.snapshot_mode = true;
    p.source = "github-pages";
    const period = STORE.manifest && STORE.manifest.period;
    if (period) {
      const msg = `GitHub Pages: показан заранее выгруженный snapshot ${period.start} - ${period.end}. Новые периоды и произвольные фильтры без SQL не пересчитываются.`;
      p.warnings = [...(p.warnings || []), msg];
    }
    return p;
  };
  const unsupported = () => fail("Этот срез не выгружен в snapshot. В GitHub Pages режиме можно смотреть общий snapshot и раскрытия БЕ/отделов, которые заранее экспортированы. Для новых фильтров сделайте новую выгрузку или запустите SQL-режим.", 422);
  const payloadForApi = async (url) => {
    const path = url.pathname;
    const params = url.searchParams;
    if (path === "/api/ping") {
      return {ok:true, db:false, snapshot_mode:true, source:"github-pages", folder:STORE.folderName, manifest:STORE.manifest};
    }
    if (DICT_MAP[path]) {
      try { return withNotice(await readJson(DICT_MAP[path])); }
      catch (e) { return {ok:true, items:[], count:0, snapshot_mode:true, source:"github-pages", warning:String(e.message || e)}; }
    }
    if (path === "/api/kpi/top") {
      const defaultOnly = hasOnlyDefaultFilters(params);
      if (hasUnsupportedFilters(params) || (hasFilters(params) && !defaultOnly)) return unsupported();
      const rel = defaultOnly ? "kpi/default/top.json" : "kpi/top.json";
      return withNotice(await readJson(rel));
    }
    if (path === "/api/kpi/branches") {
      const defaultOnly = hasOnlyDefaultFilters(params);
      if (hasUnsupportedFilters(params) || (hasFilters(params) && !defaultOnly)) return unsupported();
      const rel = defaultOnly ? "kpi/default/branches.json" : "kpi/branches.json";
      return withNotice(await readJson(rel));
    }
    if (path === "/api/kpi/departments") {
      const buId = singleValue(params, "bu_ids");
      if (String(params.get("bu_ids") || "").trim() && !buId) return unsupported();
      const defaultOnly = hasOnlyDefaultFilters(params, ["bu_ids"]);
      if (hasUnsupportedFilters(params, ["bu_ids"]) || (hasFilters(params, ["bu_ids"]) && !defaultOnly)) return unsupported();
      if (buId) {
        const prefix = defaultOnly ? "details/default_branch_" : "details/branch_";
        return withNotice(await readJson(`${prefix}${buId}_departments.json`));
      }
      const rel = defaultOnly ? "kpi/default/departments.json" : "kpi/departments.json";
      return withNotice(await readJson(rel));
    }
    if (path === "/api/kpi/clients") {
      const deptId = singleValue(params, "dept_ids");
      if (String(params.get("dept_ids") || "").trim() && !deptId) return unsupported();
      const defaultOnly = hasOnlyDefaultFilters(params, ["dept_ids"]);
      if (hasUnsupportedFilters(params, ["dept_ids"]) || (hasFilters(params, ["dept_ids"]) && !defaultOnly)) return unsupported();
      if (deptId) {
        const prefix = defaultOnly ? "details/default_department_" : "details/department_";
        return withNotice(await readJson(`${prefix}${deptId}_clients.json`));
      }
      const rel = defaultOnly ? "kpi/default/clients.json" : "kpi/clients.json";
      return withNotice(await readJson(rel));
    }
    if (path === "/api/kpi/ar-aging") {
      const defaultOnly = hasOnlyDefaultFilters(params);
      if (hasUnsupportedFilters(params) || (hasFilters(params) && !defaultOnly)) return unsupported();
      const rel = defaultOnly ? "kpi/default/ar-aging.json" : "kpi/ar-aging.json";
      return withNotice(await readJson(rel));
    }
    if (path === "/api/kpi/inventory") {
      const defaultOnly = hasOnlyDefaultFilters(params);
      if (hasUnsupportedFilters(params) || (hasFilters(params) && !defaultOnly)) return unsupported();
      const rel = defaultOnly ? "kpi/default/inventory.json" : "kpi/inventory.json";
      return withNotice(await readJson(rel));
    }
    return null;
  };
  const nativeFetch = window.fetch.bind(window);
  window.fetch = async function(input, init) {
    const raw = typeof input === "string" ? input : (input && input.url) || "";
    let url;
    try { url = new URL(raw, window.location.href); } catch(e) { return nativeFetch(input, init); }
    if (!url.pathname.startsWith("/api/")) return nativeFetch(input, init);
    if (!STORE.ready) return fail("Сначала нажмите 'Выбрать папку snapshot' и выберите папку с manifest.json.", 428);
    try {
      const payload = await payloadForApi(url);
      return payload ? jsonResponse(payload) : fail("Неизвестный API endpoint в snapshot-режиме: " + url.pathname, 404);
    } catch(e) {
      return fail(e.message || String(e), 500);
    }
  };
  const onFolderChange = async (ev) => {
    try {
      STORE.files.clear();
      STORE.cache.clear();
      STORE.ready = false;
      STORE.manifest = null;
      const files = Array.from(ev.target.files || []);
      if (!files.length) return;
      STORE.folderName = (files[0].webkitRelativePath || "snapshot").split("/")[0] || "snapshot";
      for (const file of files) STORE.files.set(relPath(file), file);
      const missing = REQUIRED.filter(p => !STORE.files.has(p));
      if (missing.length) throw new Error("Не хватает файлов: " + missing.join(", "));
      STORE.manifest = await readJson("manifest.json");
      STORE.ready = true;
      const p = STORE.manifest.period || {};
      setStatus(`Готово: ${STORE.folderName} · ${p.start || "?"} - ${p.end || "?"}`, "ok");
      window.dispatchEvent(new CustomEvent("kpi-snapshot-ready", {detail:{manifest:STORE.manifest, period:p}}));
    } catch(e) {
      STORE.ready = false;
      setStatus(e.message || String(e), "err");
    }
  };
  document.addEventListener("DOMContentLoaded", () => {
    const input = document.getElementById("snapshotFolderInput");
    if (input) input.addEventListener("change", onFolderChange);
  });
})();
</script>
<script type="text/babel">
const {useState, useMemo, useCallback, useEffect, useRef} = React;

const API = "/api";

// ─── Описание фильтров ────────────────────────────
const FILTER_DEFS = [
  {key:"bu_ids",     endpoint:"/dict/branches",       label:"Бизнес-единицы", placeholder:"Все БЕ"},
  {key:"mol_ids",    endpoint:"/dict/managers",       label:"Менеджеры",    placeholder:"Все менеджеры"},
  {key:"dept_ids",   endpoint:"/dict/departments",    label:"Отделы",       placeholder:"Все отделы"},
  {key:"parole_ids", endpoint:"/dict/clients",        label:"Клиенты",      placeholder:"Все клиенты"},
  {key:"pred_ids",   endpoint:"/dict/counterparties", label:"Контрагенты",  placeholder:"Все контрагенты"},
  {key:"sale_type_ids", endpoint:"/dict/sale-types",  label:"Тип продажи",  placeholder:"Все типы без маркетплейса"},
  {key:"product_group_ids", endpoint:"/dict/product-groups", label:"Товарная группа", placeholder:"Все группы без с/х животных"},
  {key:"auction_flags", endpoint:"/dict/auction",     label:"Аукцион",      placeholder:"Все продажи"},
];

const DEFAULT_FILTER_RULES = {
  sale_type_ids: {
    exclude: (item) => String(item.name || "").toLowerCase().includes("маркетплейс"),
  },
  product_group_ids: {
    exclude: (item) => Number(item.id) === 1700,
  },
};

const makeEmptyFilters = () => {
  const o = {};
  FILTER_DEFS.forEach(f => { o[f.key] = []; });
  return o;
};

// ─── Пресеты периодов ──────────────────────────────
const PRESETS = [
  {id:"w",   label:"Неделя",     days:7},
  {id:"2w",  label:"2 недели",   days:14},
  {id:"m",   label:"Месяц",      days:30},
  {id:"q",   label:"Квартал",    days:90},
  {id:"h",   label:"Полугодие",  days:180},
  {id:"y",   label:"Год",        days:365},
  {id:"cst", label:"Свой",       days:null},
];

// ─── Группировка карточек по блокам ───────────────
// sub — короткая формула, tip — описание смысла для всплывашки при ⓘ.
const BLOCKS = [
  {
    id:"result", title:"Результат", desc:"выручка и маржа за период", icoClass:"b1", ico:"💰",
    cards:[
      {
        id:"revenue_rub",
        sub:"SUM строк продаж SDOC_TOV",
        tip:"Общая сумма отгрузок клиентам за период. Отвечает на вопрос «сколько продали», но НЕ на «сколько получили денег». Выручка может расти, а денег на счету — нет."
      },
      {

// ─── Утилиты форматирования ───────────────────────
const fmtRub = (n) => {
  if (n == null || isNaN(n)) return "—";
  const abs = Math.abs(n);
  if (abs >= 1e9) return (n/1e9).toLocaleString("ru-RU",{maximumFractionDigits:2}) + " млрд";
  if (abs >= 1e6) return (n/1e6).toLocaleString("ru-RU",{maximumFractionDigits:2}) + " млн";
  if (abs >= 1e3) return (n/1e3).toLocaleString("ru-RU",{maximumFractionDigits:1}) + " тыс";
  return n.toLocaleString("ru-RU",{maximumFractionDigits:0});
};
const fmtDays = (n) => (n==null||isNaN(n)) ? "—" : n.toLocaleString("ru-RU",{maximumFractionDigits:1});
const fmtVal  = (card) => card.unit === "дни" ? fmtDays(card.value) : fmtRub(card.value);
const fmtDelta = (p) => (p==null||isNaN(p)) ? "—" : (p>0?"+":"") + p.toLocaleString("ru-RU",{maximumFractionDigits:1}) + "%";
const fmtPct = (p) => (p==null||isNaN(p)) ? "—" : p.toLocaleString("ru-RU",{maximumFractionDigits:1}) + "%";
const fmtInt = (n) => (n==null||isNaN(n)) ? "—" : Number(n).toLocaleString("ru-RU",{maximumFractionDigits:0});
const fmtQty = (n) => (n==null||isNaN(n)) ? "—" : Number(n).toLocaleString("ru-RU",{maximumFractionDigits:1});
const arrow = (p) => p==null?"":(p>0.05?"↑":p<-0.05?"↓":"→");
const fmtDate = (s) => {
  if (!s) return "—";
  const [y,m,d] = s.split("-");
  return d + "." + m + "." + y;
};
const DATE_RE = /^\d{4}-\d{2}-\d{2}$/;
const pad2 = (n) => String(n).padStart(2, "0");
const todayIso = () => {
  const d = new Date();
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
};
const dateValue = (iso) => {
  if (!DATE_RE.test(iso || "")) return NaN;
  const [y,m,d] = iso.split("-").map(Number);
  return Date.UTC(y, m-1, d);
};
const addDaysIso = (iso, days) => new Date(dateValue(iso) + days*86400000).toISOString().slice(0,10);
const daysInclusive = (start, end) => {
  const startValue = dateValue(start);
  const endValue = dateValue(end);
  if (!Number.isFinite(startValue) || !Number.isFinite(endValue)) return NaN;
  return Math.floor((endValue - startValue) / 86400000) + 1;
};

const deltaClass = (card) => {
  const p = card.delta_pct;
  if (p == null) return "flat";
  if (Math.abs(p) < 0.01) return "flat";
  if (card.lower_better) return p < 0 ? "inverse-down" : "inverse-up";
  return p > 0 ? "up" : "down";
};
const deltaClassRaw = (p, lowerBetter=false) => {
  if (p == null || isNaN(p)) return "flat";
  if (Math.abs(p) < 0.01) return "flat";
  if (lowerBetter) return p < 0 ? "inverse-down" : "inverse-up";
  return p > 0 ? "up" : "down";
};

const compareSortValues = (a, b) => {
  const an = a == null || a === "";
  const bn = b == null || b === "";
  if (an && bn) return 0;
  if (an) return 1;
  if (bn) return -1;
  if (typeof a === "number" && typeof b === "number") return a - b;
  const av = String(a).toLowerCase();
  const bv = String(b).toLowerCase();
  return av.localeCompare(bv, "ru", {numeric:true, sensitivity:"base"});
};

const sortRows = (rows, sortState) => {
  const list = [...(rows || [])];
  const key = sortState?.key;
  if (!key) return list;
  const dir = sortState.dir === "asc" ? 1 : -1;
  return list.sort((a, b) => compareSortValues(a?.[key], b?.[key]) * dir);
};

const nextSortState = (prev, key) => ({
  key,
  dir: prev?.key === key && prev?.dir === "desc" ? "asc" : "desc",
});

function useSortedRows(rows, defaultKey="rank", defaultDir="asc") {
  const [sortState, setSortState] = useState({key:defaultKey, dir:defaultDir});
  const sortedRows = useMemo(() => sortRows(rows, sortState), [rows, sortState]);
  const requestSort = useCallback((key) => setSortState(prev => nextSortState(prev, key)), []);
  return {rows:sortedRows, sortState, requestSort};
}

const sortable = (sortState, requestSort, key) => ({sortKey:key, sortState, onSort:requestSort});

function Th({children, className="", tip, sortKey, sortState, onSort}) {
  const active = Boolean(sortKey && sortState?.key === sortKey);
  const cls = (
    className +
    (tip ? " has-tip" : "") +
    (sortKey ? " sortable" : "") +
    (active ? " active" : "")
  ).trim();
  return (
    <th
      className={cls || undefined}
      title={tip || undefined}
      onClick={sortKey && onSort ? () => onSort(sortKey) : undefined}
    >
      {children}
      {tip && <span className="th-info">?</span>}
      {sortKey && <span className="sort-mark">{active ? (sortState.dir === "asc" ? "↑" : "↓") : "↕"}</span>}
    </th>
  );
}

// ─── MultiSelect с поиском ───────────────────────
function MultiSelect({def, value, onChange, dictQuery}) {
  const [open, setOpen] = useState(false);
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(false);
  const [loadError, setLoadError] = useState("");
  const [search, setSearch] = useState("");
  const [loaded, setLoaded] = useState(false);
  const rootRef = useRef(null);
  const searchRef = useRef(null);

  // Загружаем справочник при первом открытии.
  const fetchItems = useCallback(async (q) => {
    setLoading(true);
    setLoadError("");
    try {
      const params = new URLSearchParams(dictQuery || "");
      if (q) params.set("q", q);
      const query = params.toString();
      const url = API + def.endpoint + (query ? `?${query}` : "");
      const r = await fetch(url);
      const j = await r.json();
      if (j.ok) setItems(j.items || []);
      else {
        setLoadError(j.error || "Ошибка загрузки справочника");
        setItems([]);
      }
    } catch (e) {
      console.error("[MS]", def.key, e);
      setLoadError(e.message || String(e));
      setItems([]);
    } finally {
      setLoading(false);
      setLoaded(true);
    }
  }, [def.endpoint, def.key, dictQuery]);

  useEffect(() => {
    setItems([]);
    setLoaded(false);
  }, [dictQuery, def.endpoint]);

  // Открытие поповера — грузим данные один раз.
  useEffect(() => {
    if (open && !loaded) fetchItems("");
    if (open && searchRef.current) setTimeout(() => searchRef.current?.focus(), 10);
  }, [open, loaded, fetchItems]);

  // Debounce-поиск: при изменении search перезапрашиваем (если >= 2 символов или пусто).
  useEffect(() => {
    if (!open) return;
    const t = setTimeout(() => {
      if (search.length === 0 || search.length >= 2) fetchItems(search);
    }, 300);
    return () => clearTimeout(t);
  }, [search, open, fetchItems]);

  // Клик вне поповера — закрываем.
  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => {
      if (rootRef.current && !rootRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, [open]);

  const selectedSet = useMemo(() => new Set(value), [value]);

  const toggle = (id) => {
    const next = selectedSet.has(id)
      ? value.filter(v => v !== id)
      : [...value, id];
    onChange(next);
  };

  const clearAll = () => onChange([]);
  const selectVisible = () => {
    const add = items.filter(i => !selectedSet.has(i.id)).map(i => i.id);
    if (add.length) onChange([...value, ...add]);
  };

  // Текст триггера: "3 выбрано" или имя первого, или placeholder.
  let triggerText;
  if (value.length === 0) {
    triggerText = def.placeholder;
  } else if (value.length === 1) {
    const found = items.find(i => i.id === value[0]);
    triggerText = found ? found.name : `ID ${value[0]}`;
  } else {
    triggerText = `Выбрано: ${value.length}`;
  }

  const triggerCls =
    "ms-trigger" +
    (value.length > 0 ? " active" : "") +
    (open ? " open" : "");

  return (
    <div className={"ms ms-" + def.key} ref={rootRef}>
      <div className="ms-label">{def.label}</div>
      <div className={triggerCls} onClick={() => setOpen(o => !o)}>
        <span className={"ms-trigger-text"+(value.length===0?" ms-placeholder":"")}>{triggerText}</span>
        {value.length > 0 && <span className="ms-count">{value.length}</span>}
        <span className="ms-arrow">▼</span>
      </div>
      {open && (
        <div className="ms-pop" onClick={e => e.stopPropagation()}>
          <input
            ref={searchRef}
            className="ms-search"
            placeholder="Поиск…"
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
          <div className="ms-list">
            {loading && <div className="ms-empty">Загрузка…</div>}
            {!loading && loadError && <div className="ms-empty">Ошибка загрузки</div>}
            {!loading && !loadError && items.length === 0 && <div className="ms-empty">Ничего не найдено</div>}
            {!loading && items.map(it => {
              const on = selectedSet.has(it.id);
              return (
                <div key={it.id}
                     className={"ms-opt"+(on?" on":"")}
                     onClick={() => toggle(it.id)}
                     title={it.name}>
                  <span className="ms-opt-box">{on ? "✓" : ""}</span>
                  <span className="ms-opt-text">{it.name || "—"}</span>
                </div>
              );
            })}
          </div>
          <div className="ms-foot">
            <button className="ms-foot-btn" onClick={selectVisible}>Добавить всё</button>
            <button className="ms-foot-btn" onClick={clearAll}>Очистить</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Форматирование цели для тултипа ──────────────
const fmtTargetVal = (target, unit) => {
  if (target == null) return "";
  return unit === "дни" ? fmtDays(target) + " дн." : fmtRub(target) + " руб";
};

// Текст «Цель: ≤ 45 дн.» / «Цель: ≥ 45 дн.» / «Цель: 0 руб».
const targetLine = (card) => {
  if (card.target == null) return null;
  const val = fmtTargetVal(card.target, card.unit);
  if (card.target === 0) return "Цель: " + val;
  const sign = card.lower_better ? "≤" : "≥";
  return "Цель: " + sign + " " + val;
};

// ─── Тултип с описанием и целью ───────────────────
function CardTooltip({card, tip}) {
  const tline = targetLine(card);
  return (
    <span className="card-tooltip">
      <b>{card.label}.</b> {tip}
      {tline && <span className="tt-target"><b>●</b> {tline}</span>}
    </span>
  );
}

function CardInfo({card, tip}) {
  const ref = useRef(null);
  const [edge, setEdge] = useState("center");
  const alignTooltip = () => {
    const el = ref.current;
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const width = Math.min(320, Math.max(240, window.innerWidth - 32));
    const center = rect.left + rect.width / 2;
    if (center - width / 2 < 16) setEdge("left");
    else if (center + width / 2 > window.innerWidth - 16) setEdge("right");
    else setEdge("center");
  };
  return (
    <span
      ref={ref}
      className={"card-info" + (edge === "center" ? "" : " tt-" + edge)}
      aria-label="Описание"
      onMouseEnter={alignTooltip}
      onFocus={alignTooltip}
    >
      ?
      <CardTooltip card={card} tip={tip}/>
    </span>
  );
}

function Card({card, sub, tip}) {
  if (card.error) {
    return (
      <div className="card err">
        <div className="card-head">
          <div className="card-label-wrap">
            <div className="card-label">{card.label}</div>
            {tip && <CardInfo card={card} tip={tip}/>}
          </div>
        </div>
        <div className="card-value">ошибка</div>
        <div className="card-sub" style={{color:"#b91c1c"}}>{card.error}</div>
      </div>
    );
  }
  const cls = "card" + (card.score ? " s"+card.score : "");
  return (
    <div className={cls}>
      <div className="card-head">
        <div className="card-label-wrap">
          <div className="card-label">{card.label}</div>
          {tip && <CardInfo card={card} tip={tip}/>}
        </div>
        {card.score != null && (
          <span className={"card-score s"+card.score}>● {card.score}/5</span>
        )}
      </div>
      <div className="card-value">
        {fmtVal(card)}<span className="card-unit">{card.unit}</span>
      </div>
      {sub && <div className="card-sub">{sub}</div>}
      <div className="card-foot">
        <span className="card-foot-label">vs прошлый период</span>
        <span className={"delta "+deltaClass(card)}>
          {arrow(card.delta_pct)} {fmtDelta(card.delta_pct)}
        </span>
      </div>
    </div>
  );
}

function DeltaBadge({value, lowerBetter=false}) {

function StockBars({title, sub, rows, labelKey, countKey="sku_count", countLabel="SKU"}) {
  const safeRows = rows || [];
  const maxValue = Math.max(1, ...safeRows.map(r => Math.abs(r.value_rub || 0)));
  return (
    <div className="stock-panel">
      <div className="stock-panel-head">
        <div>
          <div className="stock-panel-title">{title}</div>
          {sub && <div className="stock-panel-sub">{sub}</div>}
        </div>
      </div>
      <div className="stock-bars">
        {safeRows.length === 0 && <div className="ms-empty">Нет данных</div>}
        {safeRows.map((r, i) => {
          const value = r.value_rub || 0;
          const width = Math.max(1, Math.abs(value) / maxValue * 100);
          const name = r[labelKey] || r.bucket || "Без названия";
          return (
            <div className="stock-bar-row" key={(name || "") + i}>
              <div className="stock-bar-head">
                <div className="stock-bar-name" title={name}>{name}</div>
                <div className="stock-bar-meta">{fmtRub(value)}</div>
              </div>
              <div className="stock-track">
                <div className="stock-fill" style={{width: width + "%"}}/>
              </div>
              <div className="stock-bar-foot">
                <span>{fmtPct(r.share_pct)} от итога</span>
                <span>{r[countKey] == null ? "" : `${fmtInt(r[countKey])} ${countLabel}`}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

const stockStatusClass = (status) => {
  if ((status || "").includes("Неликвид")) return "risk";
  if ((status || "").includes("Slow")) return "warn";
  return "ok";
};

function DepartmentView({data, loading, err, requestKey}) {
  const [expandedDeptId, setExpandedDeptId] = useState(null);
  const [detailByDept, setDetailByDept] = useState({});
  const [detailLoadingDept, setDetailLoadingDept] = useState(null);
  const [detailErr, setDetailErr] = useState(null);
  const [detailSortState, setDetailSortState] = useState({key:"revenue_rub", dir:"desc"});
  const requestDetailSort = useCallback((key) => setDetailSortState(prev => nextSortState(prev, key)), []);
  const {rows: sortedRows, sortState, requestSort} = useSortedRows(data?.rows || [], "revenue_rub", "desc");

  useEffect(() => {
    setExpandedDeptId(null);
    setDetailByDept({});
    setDetailLoadingDept(null);
    setDetailErr(null);
  }, [requestKey]);

  const loadDepartmentClients = useCallback(async (deptId) => {
    const key = String(deptId);
    if (detailByDept[key]) return;
    setDetailLoadingDept(deptId);
    setDetailErr(null);
    try {
      const params = new URLSearchParams(requestKey || "");
      params.set("dept_ids", key);
      params.set("sort", "revenue");
      const url = `${API}/kpi/clients?${params.toString()}`;
      const r = await fetch(url);
      const j = await r.json();
      if (!j.ok) throw new Error(j.error || "Неизвестная ошибка");
      setDetailByDept(prev => ({...prev, [key]: j}));
    } catch (e) {
      setDetailErr(e.message || String(e));
    } finally {
      setDetailLoadingDept(null);
    }
  }, [requestKey, detailByDept]);

  const toggleDepartment = (row) => {
    const deptId = row.department_id;
    if (expandedDeptId === deptId) {
      setExpandedDeptId(null);
      return;
    }
    setExpandedDeptId(deptId);
    loadDepartmentClients(deptId);
  };

  if (loading) {
    return (
      <div className="loading">
        <div className="spinner"></div>
        <div className="loading-text">Считаю KPI по отделам. FIFO по задолженности может занять до минуты…</div>

    );

  if (err) {
    return <div className="err-panel"><b>Ошибка расчёта отделов:</b> {err}</div>;

    );

  const rows = sortedRows;
  const totals = data.totals || {};

        </div>

function CycleView({data, loading, err}) {
  if (loading) {
    return (
      <div className="loading">
        <div className="spinner"></div>
        <div className="loading-text">Собираю DIO, DSO, DPO и CCC…</div>
      </div>
    );
  }
  if (err) {
    return <div className="err-panel"><b>Ошибка денежного цикла:</b> {err}</div>;
  }
  if (!data) {
    return (
      <div className="empty-state">
        <div className="empty-state-ico">↔</div>
        <div className="empty-state-title">Нажмите «Рассчитать», чтобы увидеть денежный цикл</div>
        <div className="empty-state-sub">Waterfall покажет вклад запасов, клиентов и поставщиков</div>
      </div>
    );
  }

  const byId = {};
  (data.cards || []).forEach(c => { byId[c.id] = c; });
  const dio = byId.dio_days?.value || 0;
  const dso = byId.dso_days?.value || 0;
  const dpo = byId.dpo_days?.value || 0;
  const ccc = byId.ccc_days?.value || 0;
  const rows = [
    {label:"DIO", sub:"запасы", value:dio, signed:dio},
    {label:"DSO", sub:"клиенты", value:dso, signed:dso},
    {label:"− DPO", sub:"поставщики", value:dpo, signed:-dpo},
  ];
  const maxAbs = Math.max(1, ...rows.map(r => Math.abs(r.signed)), Math.abs(ccc));

  return (
    <>
      <div className="dept-summary">
        <div className="dept-summary-item">
          <div className="dept-summary-label">DIO</div>
          <div className="dept-summary-value">{fmtDays(dio)} дн.</div>
        </div>
        <div className="dept-summary-item">
          <div className="dept-summary-label">DSO</div>
          <div className="dept-summary-value">{fmtDays(dso)} дн.</div>
        </div>
        <div className="dept-summary-item">
          <div className="dept-summary-label">DPO</div>
          <div className="dept-summary-value">{fmtDays(dpo)} дн.</div>
        </div>
        <div className="dept-summary-item">
          <div className="dept-summary-label">CCC</div>
          <div className="dept-summary-value">{fmtDays(ccc)} дн.</div>
        </div>
        <div className="dept-summary-item">
          <div className="dept-summary-label">Стоимость ОК</div>
          <div className="dept-summary-value">{fmtRub(byId.wc_fin_cost_rub?.value)}</div>
        </div>
      </div>

      <div className="cycle-panel">
        <div className="cycle-title">Денежный цикл</div>
        <div className="cycle-sub">CCC = DIO + DSO − DPO. Положительное значение означает, что бизнес финансируется своими деньгами.</div>
        <div className="wf">
          {rows.map(r => (
            <div className="wf-row" key={r.label}>
              <div>
                <div className="wf-label">{r.label}</div>
                <span className="muted">{r.sub}</span>
              </div>
              <div className="wf-track">
                <div className={"wf-fill" + (r.signed < 0 ? " neg" : "")}
                     style={{width: Math.max(2, Math.abs(r.signed) / maxAbs * 100) + "%"}}/>
              </div>
              <div className="wf-value">{r.signed < 0 ? "−" : ""}{fmtDays(Math.abs(r.value))} дн.</div>
            </div>
          ))}
          <div className="wf-row total">
            <div className="wf-label">= CCC</div>
            <div className="wf-track">
              <div className={"wf-fill" + (ccc < 0 ? " neg" : "")}
                   style={{width: Math.max(2, Math.abs(ccc) / maxAbs * 100) + "%"}}/>
            </div>
            <div className="wf-value">{fmtDays(ccc)} дн.</div>
          </div>
        </div>
      </div>
    </>
  );
}
