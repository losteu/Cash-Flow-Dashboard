    const sum = (k) => sourceRows.reduce((s, r) => s + (r[k] || 0), 0);
    const weightedTop3 = totals.revenue_rub
      ? sourceRows.reduce((s, r) => s + (r.revenue_rub || 0) * (r.top3_client_share_pct || 0), 0) / totals.revenue_rub
      : sum("top3_client_share_pct") / n;
    return {
      health_score: totals.health_score ?? (sum("health_score") / n),
      health_score_delta: totals.health_score_delta ?? (sum("health_score_delta") / n),
      margin_pct: totals.revenue_rub ? (totals.margin_rub / totals.revenue_rub * 100) : sum("margin_pct") / n,
      margin_delta_pct: totals.margin_delta_pct ?? (sum("margin_delta_pct") / n),
      margin_ar_ratio: totals.ar_rub ? (totals.margin_rub / totals.ar_rub) : sum("margin_ar_ratio") / n,
      cash_adj_margin_pct: totals.revenue_rub ? ((totals.cash_adj_margin_rub || 0) / totals.revenue_rub * 100) : sum("cash_adj_margin_pct") / n,
      revenue_delta_pct: totals.revenue_delta_pct ?? (sum("revenue_delta_pct") / n),
      dso_days: totals.dso_days ?? (sum("dso_days") / n),
      cei_pct: totals.cei_pct,
      overdue_share_pct: totals.ar_rub ? (totals.overdue_ar_rub / totals.ar_rub * 100) : sum("overdue_share_pct") / n,
      overdue_ar_delta_pct: totals.overdue_ar_delta_pct ?? (sum("overdue_ar_delta_pct") / n),
      top3_client_share_pct: weightedTop3,
    };
  }, [sourceRows, totals]);

  useEffect(() => {
    setExpandedDeptId(null);
    setDetailByDept({});
    setDetailLoadingDept(null);
    setDetailErr(null);
    setDetailVisibleCountByDept({});
  }, [requestKey]);

  const loadDepartmentClients = useCallback(async (deptId) => {
    const key = String(deptId);
    if (detailByDept[key]) return;
    setDetailLoadingDept(deptId);
    setDetailErr(null);
    try {
      const params = new URLSearchParams(requestKey || "");
      params.set("dept_ids", key);
      params.set("sort", "revenue");
      const url = `${API}/kpi/clients?${params.toString()}`;
      const r = await fetch(url);
      const j = await r.json();
      if (!j.ok) throw new Error(j.error || "Неизвестная ошибка");
      setDetailByDept(prev => ({...prev, [key]: j}));
    } catch (e) {
      setDetailErr(e.message || String(e));
    } finally {
      setDetailLoadingDept(null);
    }
  }, [requestKey, detailByDept]);

      return;

          )}
        </table>
      </div>
    </>
  );
}

function ManagerView({data, loading, err, requestKey}) {
  const [expandedManagerId, setExpandedManagerId] = useState(null);
  const [detailByManager, setDetailByManager] = useState({});
  const [detailLoadingManager, setDetailLoadingManager] = useState(null);
  const [detailErr, setDetailErr] = useState(null);
  const [detailSortState, setDetailSortState] = useState({key:"revenue_rub", dir:"desc"});
  const requestDetailSort = useCallback((key) => setDetailSortState(prev => nextSortState(prev, key)), []);
  const {rows: sortedRows, sortState, requestSort} = useSortedRows(data?.rows || [], "revenue_rub", "desc");
  const rows = sortedRows;
  const totals = data?.totals || {};
  const avg = useMemo(() => {
    if (!rows.length) return null;
    const n = rows.length;
    const sum = (k) => rows.reduce((s, r) => s + (r[k] || 0), 0);
    return {
      margin_pct: totals.revenue_rub ? (totals.margin_rub / totals.revenue_rub * 100) : sum("margin_pct") / n,
      revenue_delta_pct: sum("revenue_delta_pct") / n,
      dso_days: sum("dso_days") / n,
      cei_pct: totals.cei_pct,
      overdue_share_pct: totals.ar_rub ? (totals.overdue_ar_rub / totals.ar_rub * 100) : sum("overdue_share_pct") / n,
    };
  }, [rows, totals]);

  useEffect(() => {
    setExpandedManagerId(null);
    setDetailByManager({});
    setDetailLoadingManager(null);
    setDetailErr(null);
  }, [requestKey]);

  const loadManagerClients = useCallback(async (managerId) => {
    const key = String(managerId);
    if (detailByManager[key]) return;
    setDetailLoadingManager(managerId);
    setDetailErr(null);
    try {
      const params = new URLSearchParams(requestKey || "");
      params.set("mol_ids", key);
      params.set("sort", "revenue");
      const url = `${API}/kpi/clients?${params.toString()}`;
      const r = await fetch(url);
      const j = await r.json();
      if (!j.ok) throw new Error(j.error || "Неизвестная ошибка");
      setDetailByManager(prev => ({...prev, [key]: j}));
    } catch (e) {
      setDetailErr(e.message || String(e));
    } finally {
      setDetailLoadingManager(null);
    }
  }, [requestKey, detailByManager]);

  const toggleManager = (row) => {
    const managerId = row.manager_id;
    if (expandedManagerId === managerId) {
      setExpandedManagerId(null);
      return;
    }
    setExpandedManagerId(managerId);
    loadManagerClients(managerId);
  };

  if (loading) {
    return (
      <div className="loading">
        <div className="spinner"></div>
        <div className="loading-text">Считаю KPI по менеджерам. Сверяю продажи, ДЗ и просрочку…</div>

  );
  const {rows: sortedRows, sortState, requestSort} = useSortedRows(agingRows, "overdue_rub", "desc");

  if (loading) {
    return (
      <div className="loading">
        <div className="spinner"></div>
        <div className="loading-text">Раскладываю дебиторку по срокам оплаты FIFO…</div>
      </div>
    );
  }
  if (err) {
    return <div className="err-panel"><b>Ошибка aging ДЗ:</b> {err}</div>;
  }
  if (!data) {
    return (
      <div className="empty-state">
        <div className="empty-state-ico">▧</div>

  return (

function App() {
  const [preset, setPreset] = useState("m");    // активный чип
  const [customEnd, setCustomEnd] = useState(() => todayIso());
  const [customStart, setCustomStart] = useState(() => addDaysIso(todayIso(), -29));
  const [rate, setRate] = useState(20);         // процентов годовых
  const [compareMode, setCompareMode] = useState("prev");
  const [activeTab, setActiveTab] = useState("overview");
  const [data, setData] = useState(null);
  const [branchData, setBranchData] = useState(null);
  const [managerData, setManagerData] = useState(null);
  const [deptData, setDeptData] = useState(null);
  const [clientData, setClientData] = useState(null);
  const [inventoryData, setInventoryData] = useState(null);
  const [arAgingData, setArAgingData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [branchLoading, setBranchLoading] = useState(false);
  const [managerLoading, setManagerLoading] = useState(false);
  const [deptLoading, setDeptLoading] = useState(false);
  const [clientLoading, setClientLoading] = useState(false);
  const [inventoryLoading, setInventoryLoading] = useState(false);
  const [arAgingLoading, setArAgingLoading] = useState(false);
  const [err, setErr] = useState(null);
  const [branchErr, setBranchErr] = useState(null);
  const [managerErr, setManagerErr] = useState(null);
  const [deptErr, setDeptErr] = useState(null);
  const [clientErr, setClientErr] = useState(null);
  const [inventoryErr, setInventoryErr] = useState(null);
  const [arAgingErr, setArAgingErr] = useState(null);
  const [pngExporting, setPngExporting] = useState(false);
  const [autoReloadEnabled, setAutoReloadEnabled] = useState(false);
  const [snapshotReady, setSnapshotReady] = useState(Boolean(window.KPI_SNAPSHOT_STORE?.ready));
  const captureRef = useRef(null);
  const lastLoadedKeyRef = useRef(null);
  const branchLoadedKeyRef = useRef(null);
  const managerLoadedKeyRef = useRef(null);
  const deptLoadedKeyRef = useRef(null);
  const clientLoadedKeyRef = useRef(null);
  const inventoryLoadedKeyRef = useRef(null);
  const arAgingLoadedKeyRef = useRef(null);
  const snapshotClientMode = Boolean(window.KPI_GITHUB_SNAPSHOT);
  const requestSeqRef = useRef(0);
  const branchSeqRef = useRef(0);
  const managerSeqRef = useRef(0);
  const deptSeqRef = useRef(0);
  const clientSeqRef = useRef(0);
  const inventorySeqRef = useRef(0);
  const arAgingSeqRef = useRef(0);
  const defaultFiltersRef = useRef(makeEmptyFilters());
  const [defaultFiltersLoading, setDefaultFiltersLoading] = useState(false);
  const [filtersCollapsed, setFiltersCollapsed] = useState(true);

  // Состояние фильтров: {mol_ids:[], dept_ids:[], parole_ids:[], pred_ids:[]}
  const [filters, setFilters] = useState(() => makeEmptyFilters());

  const setFilter = (key, val) => setFilters(f => ({...f, [key]: val}));
  const resetFilters = () => {
    setFilters({...makeEmptyFilters(), ...defaultFiltersRef.current});
  };
  const filtersActive = useMemo(
    () => FILTER_DEFS.some(f => (filters[f.key] || []).length > 0),
    [filters]
  );
  const filterSummaryItems = useMemo(
    () => FILTER_DEFS.map(def => {
      const count = (filters[def.key] || []).length;
      return {
        key: def.key,
        label: FILTER_SHORT_LABELS[def.key] || def.label,
        value: count ? fmtInt(count) : "все",
        active: count > 0,
      };
    }),
    [filters]
  );

  const customPeriodDays = useMemo(() => daysInclusive(customStart, customEnd), [customStart, customEnd]);
  const customPeriodInvalid = preset === "cst" && (!Number.isFinite(customPeriodDays) || customPeriodDays < 1);
  const customPeriodError = !customPeriodInvalid
    ? null
    : Number.isFinite(customPeriodDays)
      ? "дата начала позже даты окончания."
      : "заполните обе даты периода.";
  const effectiveDays = useMemo(() => {
    if (preset === "cst") return customPeriodInvalid ? 1 : customPeriodDays;
    return PRESETS.find(p => p.id===preset)?.days || 30;
  }, [preset, customPeriodDays, customPeriodInvalid]);
  const effectiveEnd = preset === "cst" && !customPeriodInvalid ? customEnd : null;
  const compareModeDisabled = snapshotClientMode || Boolean(data?.snapshot_mode);
  const snapshotLoadBlocked = snapshotClientMode && !snapshotReady;
  const compareLabel = data?.period?.compare_label || (compareMode === "yoy" ? "YoY" : "Предыдущий период");
  const periodSummary = useMemo(() => {
    const period = data?.period;
    if (!period) return null;
    const currentRangeText = `${fmtDate(period.start)}-${fmtDate(period.end)} (${fmtInt(period.days)} дн.)`;
    const compareRangeText = period.prev_start && period.prev_end
      ? `${fmtDate(period.prev_start)}-${fmtDate(period.prev_end)}`
      : compareLabel;
    const compareText = period.compare_mode === "yoy"
      ? `YoY: ${compareRangeText}`
      : `сравн.: ${compareRangeText}`;
    const rateText = `@${(period.rate * 100).toLocaleString("ru-RU", {maximumFractionDigits:1})}% годовых`;
    return {
      text: `${currentRangeText} · ${compareText} · ${rateText}`,
      title: `${fmtDate(period.start)} — ${fmtDate(period.end)} · ${compareLabel}: ${compareRangeText} · ${(period.rate * 100).toLocaleString("ru-RU", {maximumFractionDigits:1})}% годовых`,
    };
  }, [data?.period, compareLabel]);

  const requestKey = useMemo(() => {
    const parts = [`period_days=${effectiveDays}`, `rate=${rate/100}`, `compare_mode=${compareMode}`];
    if (effectiveEnd) parts.push(`end=${effectiveEnd}`);
    FILTER_DEFS.forEach(f => {
      const ids = filters[f.key];
      if (ids && ids.length) parts.push(`${f.key}=${ids.join(",")}`);
    });
    return parts.join("&");
  }, [effectiveDays, effectiveEnd, rate, filters, compareMode]);

  const dictQuery = useMemo(() => {
    const parts = [`period_days=${effectiveDays}`];
    if (effectiveEnd) parts.push(`end=${effectiveEnd}`);
    return parts.join("&");
  }, [effectiveDays, effectiveEnd]);

  useEffect(() => {
    const syncSnapshotReady = (event) => {
      setSnapshotReady(Boolean(event?.detail?.ready));
    };
    window.addEventListener("kpi:snapshot-ready", syncSnapshotReady);
    return () => window.removeEventListener("kpi:snapshot-ready", syncSnapshotReady);
  }, []);

  useEffect(() => {
    if (snapshotClientMode && !snapshotReady) return;

    let cancelled = false;
    const sameIds = (a=[], b=[]) => {
      if (a.length !== b.length) return false;
      const aa = [...a].map(Number).sort((x,y) => x-y);
      const bb = [...b].map(Number).sort((x,y) => x-y);
      return aa.every((v, i) => v === bb[i]);
    };

    const loadDefaultFilters = async () => {
      setDefaultFiltersLoading(true);
      const nextDefaults = makeEmptyFilters();
      for (const def of FILTER_DEFS) {
        const rule = DEFAULT_FILTER_RULES[def.key];
        if (!rule) continue;
        try {
          const params = new URLSearchParams(dictQuery || "");
          params.set("limit", "5000");
          const url = API + def.endpoint + "?" + params.toString();
          const r = await fetch(url);
          const j = await r.json();
          if (!j.ok) continue;
          const items = j.items || [];
          if (rule.enabled && !rule.enabled(items)) continue;
          nextDefaults[def.key] = items
            .filter(item => !rule.exclude(item))
            .map(item => item.id);
        } catch (e) {
          console.warn("[KPI default filters]", def.key, e);
        }
      }
      if (cancelled) return;
      const prevDefaults = defaultFiltersRef.current || makeEmptyFilters();
      defaultFiltersRef.current = nextDefaults;
      setFilters(prev => {
        const next = {...prev};
        Object.keys(DEFAULT_FILTER_RULES).forEach(key => {
          const cur = prev[key] || [];
          const oldDefault = prevDefaults[key] || [];
          if (cur.length === 0 || sameIds(cur, oldDefault)) {
            next[key] = nextDefaults[key] || [];
          }
        });
        return next;
      });
      setDefaultFiltersLoading(false);
    };

    loadDefaultFilters();
    return () => {
      cancelled = true;
      setDefaultFiltersLoading(false);
    };
  }, [dictQuery, snapshotClientMode, snapshotReady]);

  useEffect(() => {
    if (data?.snapshot_mode && compareMode !== "prev") {
      setCompareMode("prev");
    }
  }, [data?.snapshot_mode, compareMode]);

  const loadBranches = useCallback(async () => {
    if (customPeriodInvalid) {
      setBranchErr(customPeriodError);
      return;
    }
    const seq = ++branchSeqRef.current;
    setBranchLoading(true);
    setBranchErr(null);
    const url = `${API}/kpi/branches?${requestKey}`;
    console.log("[KPI branches] fetch:", url);
    try {
      const r = await fetch(url);
      const j = await r.json();
      console.log("[KPI branches] payload:", j);
      if (seq !== branchSeqRef.current) return;
      if (!j.ok) throw new Error(j.error || "Неизвестная ошибка");
      setBranchData(j);
      branchLoadedKeyRef.current = requestKey;
    } catch (e) {
      if (seq !== branchSeqRef.current) return;
      console.error("[KPI branches] fetch error:", e);
      setBranchErr(e.message || String(e));
    } finally {
      if (seq === branchSeqRef.current) setBranchLoading(false);
    }
  }, [requestKey, customPeriodInvalid, customPeriodError]);

  const loadManagers = useCallback(async () => {
    if (customPeriodInvalid) {
      setManagerErr(customPeriodError);
      return;
    }
    const seq = ++managerSeqRef.current;
    setManagerLoading(true);
    setManagerErr(null);
    const url = `${API}/kpi/managers?${requestKey}`;
    console.log("[KPI managers] fetch:", url);
    try {
      const r = await fetch(url);
      const j = await r.json();
      console.log("[KPI managers] payload:", j);
      if (seq !== managerSeqRef.current) return;
      if (!j.ok) throw new Error(j.error || "Неизвестная ошибка");
      setManagerData(j);
      managerLoadedKeyRef.current = requestKey;
    } catch (e) {
      if (seq !== managerSeqRef.current) return;
      console.error("[KPI managers] fetch error:", e);
      setManagerErr(e.message || String(e));
    } finally {
      if (seq === managerSeqRef.current) setManagerLoading(false);
    }
  }, [requestKey, customPeriodInvalid, customPeriodError]);

  const loadDepartments = useCallback(async () => {
    if (customPeriodInvalid) {
      setDeptErr(customPeriodError);
      return;
    }
    const seq = ++deptSeqRef.current;
    setDeptLoading(true);
    setDeptErr(null);
    const url = `${API}/kpi/departments?${requestKey}`;
    console.log("[KPI departments] fetch:", url);
    try {
      const r = await fetch(url);
      const j = await r.json();
      console.log("[KPI departments] payload:", j);
      if (seq !== deptSeqRef.current) return;
      if (!j.ok) throw new Error(j.error || "Неизвестная ошибка");
      setDeptData(j);
      deptLoadedKeyRef.current = requestKey;
    } catch (e) {
      if (seq !== deptSeqRef.current) return;
      console.error("[KPI departments] fetch error:", e);
      setDeptErr(e.message || String(e));
    } finally {
      if (seq === deptSeqRef.current) setDeptLoading(false);
    }
  }, [requestKey, customPeriodInvalid, customPeriodError]);

  const loadClients = useCallback(async () => {
    if (customPeriodInvalid) {
      setClientErr(customPeriodError);
      return;
    }
    const seq = ++clientSeqRef.current;
    setClientLoading(true);
    setClientErr(null);
    const url = `${API}/kpi/clients?${requestKey}`;
    console.log("[KPI clients] fetch:", url);
    try {
      const r = await fetch(url);
      const j = await r.json();
      console.log("[KPI clients] payload:", j);
      if (seq !== clientSeqRef.current) return;
      if (!j.ok) throw new Error(j.error || "Неизвестная ошибка");
      setClientData(j);
      clientLoadedKeyRef.current = requestKey;
    } catch (e) {
      if (seq !== clientSeqRef.current) return;
      console.error("[KPI clients] fetch error:", e);
      setClientErr(e.message || String(e));
    } finally {
      if (seq === clientSeqRef.current) setClientLoading(false);
    }
  }, [requestKey, customPeriodInvalid, customPeriodError]);

  const loadInventory = useCallback(async () => {
    if (customPeriodInvalid) {
      setInventoryErr(customPeriodError);
      return;
    }
    const seq = ++inventorySeqRef.current;
    setInventoryLoading(true);
    setInventoryErr(null);
    const url = `${API}/kpi/inventory?${requestKey}`;
    console.log("[KPI inventory] fetch:", url);
    try {
      const r = await fetch(url);
      const j = await r.json();
      console.log("[KPI inventory] payload:", j);
      if (seq !== inventorySeqRef.current) return;
      if (!j.ok) throw new Error(j.error || "Неизвестная ошибка");
      setInventoryData(j);
      inventoryLoadedKeyRef.current = requestKey;
    } catch (e) {
      if (seq !== inventorySeqRef.current) return;
      console.error("[KPI inventory] fetch error:", e);
      setInventoryErr(e.message || String(e));
    } finally {
      if (seq === inventorySeqRef.current) setInventoryLoading(false);
    }
  }, [requestKey, customPeriodInvalid, customPeriodError]);

  const loadArAging = useCallback(async () => {
    if (customPeriodInvalid) {
      setArAgingErr(customPeriodError);
      return;
    }
    const seq = ++arAgingSeqRef.current;
    setArAgingLoading(true);
    setArAgingErr(null);
    const url = `${API}/kpi/ar-aging?${requestKey}`;
    console.log("[KPI AR aging] fetch:", url);
    try {
      const r = await fetch(url);
      const j = await r.json();
      console.log("[KPI AR aging] payload:", j);
      if (seq !== arAgingSeqRef.current) return;
      if (!j.ok) throw new Error(j.error || "Неизвестная ошибка");
      setArAgingData(j);
      arAgingLoadedKeyRef.current = requestKey;
    } catch (e) {
      if (seq !== arAgingSeqRef.current) return;
      console.error("[KPI AR aging] fetch error:", e);
      setArAgingErr(e.message || String(e));
    } finally {
      if (seq === arAgingSeqRef.current) setArAgingLoading(false);
    }
  }, [requestKey, customPeriodInvalid, customPeriodError]);

  const load = useCallback(async () => {
    if (customPeriodInvalid) {
      setErr(customPeriodError);
      return;
    }
    const seq = ++requestSeqRef.current;
    lastLoadedKeyRef.current = requestKey;
    setAutoReloadEnabled(true);
    setLoading(true); setErr(null);
    const url = `${API}/kpi/top?${requestKey}`;
    console.log("[KPI] fetch:", url);
    try {
      const r = await fetch(url);
      const j = await r.json();
      console.log("[KPI] payload:", j);
      if (seq !== requestSeqRef.current) return;
      if (!j.ok) throw new Error(j.error || "Неизвестная ошибка");
      setData(j);
    } catch (e) {
      if (seq !== requestSeqRef.current) return;
      console.error("[KPI] fetch error:", e);
      setErr(e.message || String(e));
    } finally {
      if (seq === requestSeqRef.current) setLoading(false);
    }
  }, [requestKey, customPeriodInvalid, customPeriodError]);

  const downloadHtml = useCallback(() => {
    if (customPeriodInvalid) return;
    if (snapshotClientMode) {
      window.alert("HTML-экспорт в браузерном snapshot-режиме недоступен. Для него используйте локальный Flask-сервер или run_snapshot.bat.");
      return;
    }
    window.location.href = `${API}/export/dashboard.html?${requestKey}`;
  }, [requestKey, customPeriodInvalid, snapshotClientMode]);

  const downloadPng = useCallback(async () => {
    if (customPeriodInvalid || loading || pngExporting || !captureRef.current) return;
    setPngExporting(true);
    try {
      const htmlToImage = await loadHtmlToImage();
      const node = captureRef.current;
      const period = data?.period;
      const viewportWidth = Math.max(document.documentElement.clientWidth || 0, window.innerWidth || 0);
      const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
      const scrollX = window.scrollX || window.pageXOffset || 0;
      const scrollY = window.scrollY || window.pageYOffset || 0;
      const scale = Math.min(1.5, Math.max(1, window.devicePixelRatio || 1));
      const filename = period?.start && period?.end
        ? `kpi-screen_${period.start}_${period.end}.png`
        : `kpi-screen_${todayIso()}.png`;
      const dataUrl = await htmlToImage.toPng(node, {
        cacheBust: true,
        backgroundColor: getComputedStyle(document.body).backgroundColor || "#f4f5f9",
        pixelRatio: scale,
        width: viewportWidth,
        height: viewportHeight,
        canvasWidth: Math.round(viewportWidth * scale),
        canvasHeight: Math.round(viewportHeight * scale),
        style: {
          transform: `translate(${-scrollX}px, ${-scrollY}px)`,
          transformOrigin: "top left",
        },
      });
      const link = document.createElement("a");
      link.download = filename;
      link.href = dataUrl;
      link.click();
    } catch (e) {
      console.error("[KPI PNG] export error:", e);
      window.alert(`Не удалось сформировать PNG: ${e.message || String(e)}`);
    } finally {
      setPngExporting(false);
    }
  }, [customPeriodInvalid, loading, pngExporting, data]);

  useEffect(() => {
    if (!data) return;
    const warmup = () => loadHtmlToImage().catch(() => {});
    if (window.requestIdleCallback) {
      const idleId = window.requestIdleCallback(warmup, {timeout: 1200});
      return () => window.cancelIdleCallback(idleId);
    }
    const timer = window.setTimeout(warmup, 600);
    return () => window.clearTimeout(timer);
  }, [data]);

  useEffect(() => {
    if (!autoReloadEnabled) return;
    if (customPeriodInvalid) return;
    if (lastLoadedKeyRef.current === requestKey) return;
    const t = setTimeout(() => load(), 450);
    return () => clearTimeout(t);
  }, [autoReloadEnabled, filtersActive, customPeriodInvalid, requestKey, load]);

  useEffect(() => {
    if (activeTab !== "branches") return;
    if (!data) return;
    if (customPeriodInvalid) return;
    if (branchLoading) return;
    if (branchLoadedKeyRef.current === requestKey) return;
    const t = setTimeout(() => loadBranches(), 120);
    return () => clearTimeout(t);
  }, [activeTab, data, customPeriodInvalid, branchLoading, requestKey, loadBranches]);

  useEffect(() => {
    if (activeTab !== "managers") return;
    if (!data) return;
    if (customPeriodInvalid) return;
    if (managerLoading) return;
    if (managerLoadedKeyRef.current === requestKey) return;
    const t = setTimeout(() => loadManagers(), 120);
    return () => clearTimeout(t);
  }, [activeTab, data, customPeriodInvalid, managerLoading, requestKey, loadManagers]);

  useEffect(() => {
    if (activeTab !== "departments") return;
    if (!data) return;
    if (customPeriodInvalid) return;
    if (deptLoading) return;
    if (deptLoadedKeyRef.current === requestKey) return;
    const t = setTimeout(() => loadDepartments(), 120);
    return () => clearTimeout(t);
  }, [activeTab, data, customPeriodInvalid, deptLoading, requestKey, loadDepartments]);

  useEffect(() => {
    if (activeTab !== "clients") return;
    if (!data) return;
    if (customPeriodInvalid) return;
    if (clientLoading) return;
    if (clientLoadedKeyRef.current === requestKey) return;
    const t = setTimeout(() => loadClients(), 120);
    return () => clearTimeout(t);
  }, [activeTab, data, customPeriodInvalid, clientLoading, requestKey, loadClients]);

  useEffect(() => {
    if (activeTab !== "inventory") return;
    if (!data) return;
    if (customPeriodInvalid) return;
    if (inventoryLoading) return;
    if (inventoryLoadedKeyRef.current === requestKey) return;
    const t = setTimeout(() => loadInventory(), 120);
    return () => clearTimeout(t);
  }, [activeTab, data, customPeriodInvalid, inventoryLoading, requestKey, loadInventory]);

  useEffect(() => {
    if (activeTab !== "ar-aging") return;
    if (!data) return;
    if (customPeriodInvalid) return;
    if (arAgingLoading) return;
    if (arAgingLoadedKeyRef.current === requestKey) return;
    const t = setTimeout(() => loadArAging(), 120);
    return () => clearTimeout(t);
  }, [activeTab, data, customPeriodInvalid, arAgingLoading, requestKey, loadArAging]);

  useEffect(() => {
    if (activeTab !== "overview") return;
    if (!data) return;
    if (customPeriodInvalid) return;
    if (arAgingLoading) return;
    if (arAgingLoadedKeyRef.current === requestKey) return;
    const t = setTimeout(() => loadArAging(), 180);
    return () => clearTimeout(t);
  }, [activeTab, data, customPeriodInvalid, arAgingLoading, requestKey, loadArAging]);

  // Строим индекс карточек по id (для быстрого доступа по блокам).
  const cardMap = useMemo(() => {
    const m = {};
    (data?.cards || []).forEach(c => { m[c.id] = c; });
    return m;
  }, [data]);
  const overviewCardExtras = useMemo(() => {
    const extras = {};
    const apCard = cardMap.ap_rub;
    const overdueApCard = cardMap.overdue_ap_rub;
    if ((apCard?.value || 0) > 0 && overdueApCard?.value != null) {
      const overdueShare = Number(overdueApCard.value) / Number(apCard.value) * 100;
      if (Number.isFinite(overdueShare)) {
        extras.overdue_ap_rub = {
          tone: overdueShare >= 40 ? "risk" : overdueShare >= 20 ? "warn" : "info",
          content: <>Доля просрочки в КЗ: <strong>{fmtPct(overdueShare)}</strong></>,
        };
      }
    }
    const apAdvanceDriver = data?.insights?.ap_advance_driver;
    if (apAdvanceDriver && Math.abs(Number(apAdvanceDriver.delta_rub) || 0) > 0.01) {
      extras.ap_advance_rub = {
        tone: Number(apAdvanceDriver.delta_rub) > 0 ? "warn" : "info",
        content: (
          <>
            Драйвер {Number(apAdvanceDriver.delta_rub) > 0 ? "роста" : "снижения"}: <strong>{apAdvanceDriver.counterparty || "Без контрагента"}</strong> {fmtEffectRub(apAdvanceDriver.delta_rub)}
            {apAdvanceDriver.share_of_delta_pct == null ? "" : ` · ${fmtPct(apAdvanceDriver.share_of_delta_pct)} прироста`}
          </>
        ),
      };
    }
    const revenueBridge = data?.insights?.revenue_bridge;
    if (revenueBridge && Math.abs(Number(revenueBridge.delta_rub) || 0) > 0.01) {
      extras.revenue_rub = {
        tone: Number(revenueBridge.delta_rub) >= 0 ? "info" : "risk",
        content: (
          <>
            Цена {fmtEffectRub(revenueBridge.price_effect_rub)} · Объём {fmtEffectRub(revenueBridge.volume_effect_rub)} · Микс {fmtEffectRub(revenueBridge.mix_effect_rub)}
          </>
        ),
      };
    }
    const overdueArDriver = data?.insights?.overdue_ar_driver;
    const overdueTop = overdueArDriver?.top_contributors || [];
    const overdueTopDelta = overdueTop.reduce((sum, row) => sum + Number(row?.delta_rub || 0), 0);
    const overdueTopShare = overdueTop.reduce((sum, row) => sum + Number(row?.share_of_delta_pct || 0), 0);
    const overdueTopLabel = overdueTop.map((row) => cleanEntityLabel(row.client, "")).filter(Boolean).join(" + ");
    if (overdueArDriver && Math.abs(overdueTopDelta) > 0.01) {
      extras.overdue_ar_rub = {
        tone: "risk",
        content: (
          <>
            Драйвер: <strong>{overdueTopLabel || "крупнейшие клиенты"}</strong> {fmtEffectRub(overdueTopDelta)}
            {Number.isFinite(overdueTopShare) && overdueTopShare > 0 ? ` · ${fmtPct(overdueTopShare)} прироста` : ""}
          </>
        ),
      };
    }
    const arAdvanceContext = data?.insights?.ar_advance_context;
    if (arAdvanceContext) {
      extras.ar_advance_rub = {
        tone: Number(arAdvanceContext.days_of_revenue || 0) >= 20 ? "warn" : "info",
        content: (
          <>
            Предоплачено отгрузок на <strong>{fmtDays(arAdvanceContext.days_of_revenue)}</strong> дн.
          </>
        ),
      };
    }
    if (isStableHighCEI(cardMap.cei_pct) && Number(cardMap.cei_pct?.delta_pct) < 0) {
      extras.cei_pct = {
        tone: "info",
        content: <>Уровень CEI остаётся сильным; умеренное ухудшение динамики показано нейтрально, пока метрика выше <strong>95%</strong>.</>,
      };
    }
    const rowcCard = cardMap.rowc_pct;
    const wciCard = cardMap.wci_pct;
    const revenueCard = cardMap.revenue_rub;
    const workingCapital = revenueCard?.value == null || wciCard?.value == null
      ? null
      : Number(revenueCard.value) * Number(wciCard.value) / 100;
    if ((rowcCard?.value == null || isNaN(rowcCard?.value)) && Number.isFinite(workingCapital) && workingCapital <= 0) {
      const rowcExplain = rowcTitle(workingCapital);
      extras.rowc_pct = {
        tone: workingCapital < 0 ? "info" : "warn",
        valueLabel: "ОК≤0",
        hideUnit: true,
        valueTitle: rowcExplain,
        tooltipText: rowcExplain,
        content: <>Оборотный капитал: <strong>{fmtRub(workingCapital)}</strong>. Бизнес финансируется внешними источниками; ROWC неприменим.</>,
      };
    }
    return extras;
  }, [data, cardMap]);
  const visibleBranchData = branchLoadedKeyRef.current === requestKey ? branchData : null;
  const visibleManagerData = managerLoadedKeyRef.current === requestKey ? managerData : null;
  const visibleDeptData = deptLoadedKeyRef.current === requestKey ? deptData : null;
  const visibleClientData = clientLoadedKeyRef.current === requestKey ? clientData : null;
  const visibleInventoryData = inventoryLoadedKeyRef.current === requestKey ? inventoryData : null;
  const visibleArAgingData = arAgingLoadedKeyRef.current === requestKey ? arAgingData : null;
  const overviewChangeItems = useMemo(() => {
    const items = [];
    const isYoY = data?.period?.compare_mode === "yoy";
    const changeSuffix = isYoY ? " год к году" : "";
    const revenueBridge = data?.insights?.revenue_bridge;
    if (revenueBridge && Math.abs(Number(cardMap.revenue_rub?.delta_pct) || 0) >= 3) {
      const driver = revenueBridge.top_delta_driver;
      items.push(
        <>
          <strong>Выручка</strong> {fmtMetricDelta(cardMap.revenue_rub, data?.period)}{changeSuffix}. Цена {fmtEffectRub(revenueBridge.price_effect_rub)} · объём {fmtEffectRub(revenueBridge.volume_effect_rub)} · микс {fmtEffectRub(revenueBridge.mix_effect_rub)}
          {driver ? <>. Главный сдвиг: <strong>{driver.parent_group_name || "крупнейшая ТГ"}</strong> {fmtEffectRub(driver.delta_rub)}</> : ""}
        </>
      );
    }
    const overdueArDriver = data?.insights?.overdue_ar_driver;
    const overdueTop = overdueArDriver?.top_contributors || [];
    const overdueTopDelta = overdueTop.reduce((sum, row) => sum + Number(row?.delta_rub || 0), 0);
    const overdueTopShare = overdueTop.reduce((sum, row) => sum + Number(row?.share_of_delta_pct || 0), 0);
    const overdueTopLabel = overdueTop.map((row) => cleanEntityLabel(row.client, "")).filter(Boolean).join(" + ");
    if (overdueArDriver && Math.abs(Number(cardMap.overdue_ar_rub?.delta_pct) || 0) >= 15) {
      items.push(
        <>
          <strong>Просроченная ДЗ</strong> {fmtMetricDelta(cardMap.overdue_ar_rub, data?.period)}{changeSuffix}. Основной вклад: <strong>{overdueTopLabel || "крупнейшие клиенты"}</strong> на {fmtRub(overdueTopDelta)}
          {Number.isFinite(overdueTopShare) && overdueTopShare > 0 ? ` · ${fmtPct(overdueTopShare)} прироста` : ""}
        </>
      );
    }
    const apAdvanceDriver = data?.insights?.ap_advance_driver;
    if (apAdvanceDriver && Math.abs(Number(cardMap.ap_advance_rub?.delta_pct) || 0) >= 15) {
      items.push(
        <>
          <strong>Авансы поставщикам</strong> {fmtMetricDelta(cardMap.ap_advance_rub, data?.period)}{changeSuffix}. Драйвер: <strong>{apAdvanceDriver.counterparty || "Без контрагента"}</strong> {fmtEffectRub(apAdvanceDriver.delta_rub)}
          {apAdvanceDriver.share_of_delta_pct == null ? "" : ` · ${fmtPct(apAdvanceDriver.share_of_delta_pct)} изменения`}
        </>
      );
    }
    const arAdvanceContext = data?.insights?.ar_advance_context;
    if (arAdvanceContext && Math.abs(Number(cardMap.ar_advance_rub?.delta_pct) || 0) >= 15) {
      items.push(
        <>
          <strong>Авансы покупателей</strong> {fmtMetricDelta(cardMap.ar_advance_rub, data?.period)}{changeSuffix}. Покрывают <strong>{fmtDays(arAdvanceContext.days_of_revenue)}</strong> дн. отгрузок
        </>
      );
    }
    const deadStock = data?.insights?.dead_stock;
    if (Number(deadStock?.dead_180_rub) > 0.01) {
      items.push(
        <>
          <strong>Неликвид 180+</strong>: {fmtRub(deadStock.dead_180_rub)}
          {deadStock.dead_180_sku == null ? "" : ` · ${fmtInt(deadStock.dead_180_sku)} SKU без расхода 180+ дней`}
        </>
      );
    }
    const riskDiff = (data?.insights?.aging_risk_diff?.top_worsened_clients || []).filter((item) => {
      const amount = Math.max(
        Math.abs(Number(item?.overdue_delta_rub) || 0),
        Math.abs(Number(item?.current_bucket_rub) || 0),
      );
      if (RISK_DIFF_SEVERE_BUCKETS.has(item?.current_bucket_key)) {
        return amount >= RISK_DIFF_SEVERE_BUCKET_MIN_RUB;
      }
      return amount >= RISK_DIFF_MIN_RUB;
    });
    riskDiff.slice(0, 2).forEach((item) => {
      const clientLabel = cleanEntityLabel(item.client, "Клиент");
      const currentBucket = item.current_bucket_label || "просрочку";
      const prevBucket = item.prev_bucket_label;
      items.push(
        <>
          <strong>{clientLabel}</strong> {prevBucket ? <>перешёл из {prevBucket} в {currentBucket}</> : <>появился в {currentBucket}</>}
          {item.overdue_delta_rub == null ? "" : ` · ${fmtRub(item.overdue_delta_rub)}`}
        </>
      );
    });
    if (!items.length) {
      (data?.period_changes || []).slice(0, 3).forEach((item) => {
        items.push(
          <>
            <strong>{item.label}</strong> {fmtMetricDelta(item, data?.period)}{isYoY ? " год к году" : " к периоду сравнения"}
          </>
        );
      });
    }
    return items.slice(0, 5);
  }, [data, cardMap]);

  return (
    <div className="app-shell" ref={captureRef}>
      <header className="header">
        <div className="header-inner">
          <div className="brand">
            <div className="brand-logo">KPI</div>
            <div className="brand-text">
              <div className="brand-title">Cash Flow Dashboard</div>
              <div className="brand-sub">Денежная панель</div>
            </div>
          </div>
          <div className="filters">
            <div className="preset-group">
              <div className="preset-label">Период</div>
              <div className="preset-chips">
                {PRESETS.map(p => (
                  <button key={p.id}
                          className={"chip"+(preset===p.id?" active":"")}
                          onClick={()=>setPreset(p.id)}>
                    {p.label}
                  </button>
                ))}
              </div>
            </div>
            <div className="compare-group">
              <div className="preset-label">Сравнение</div>
              <div className="preset-chips">
                <button
                  className={"chip" + (compareMode === "prev" ? " active" : "")}
                  onClick={() => setCompareMode("prev")}
                >
                  Пред. период
                </button>
                <button
                  className={"chip" + (compareMode === "yoy" ? " active" : "")}
                  onClick={() => !compareModeDisabled && setCompareMode("yoy")}
                  disabled={compareModeDisabled}
                  title={compareModeDisabled ? "В snapshot-режиме YoY недоступен" : "Тот же диапазон прошлого года"}
                >
                  YoY
                </button>
              </div>
            </div>
            {preset==="cst" && (
              <>
                <div className="fld date">
                  <label>Дата с</label>
                  <input type="date" value={customStart}
                         onChange={e=>setCustomStart(e.target.value)}/>
                </div>
                <div className="fld date">
                  <label>Дата по</label>
                  <input type="date" value={customEnd}
                         onChange={e=>setCustomEnd(e.target.value)}/>
                </div>
              </>
            )}
            <div className="fld">
              <label>Ставка, % годовых</label>
              <input type="number" min="0" max="100" step="0.5" value={rate}
                     onChange={e=>setRate(Math.max(0, parseFloat(e.target.value)||0))}/>
            </div>
            <div className="header-actions">
              <button
                className="btn-primary"
                onClick={load}
                disabled={loading || customPeriodInvalid || defaultFiltersLoading || snapshotLoadBlocked}
                title={snapshotLoadBlocked ? "Сначала выберите snapshot-папку" : undefined}
              >
                {loading ? "Считаю…" : snapshotLoadBlocked ? "Выбрать snapshot" : defaultFiltersLoading ? "Фильтры…" : "Рассчитать"}
              </button>
              <button
                className="btn-secondary"
                onClick={downloadHtml}
                disabled={customPeriodInvalid || snapshotClientMode}
                title={snapshotClientMode ? "В браузерном snapshot-режиме HTML-экспорт недоступен" : undefined}
              >
                Скачать HTML
              </button>
              <button className="btn-secondary"
                      onClick={downloadPng}
                      disabled={customPeriodInvalid || loading || !data || pngExporting}>
                Скрин PNG
              </button>
            </div>
          </div>
        </div>
      </header>

      <div className="container">
        <div className="tabs">
          <button className={"tab-btn" + (activeTab==="overview" ? " active" : "")}
                  onClick={() => setActiveTab("overview")}>
            Общая панель
          </button>
          <button className={"tab-btn" + (activeTab==="branches" ? " active" : "")}
                  onClick={() => setActiveTab("branches")}>
            По БЕ
          </button>
          <button className={"tab-btn" + (activeTab==="managers" ? " active" : "")}
                  onClick={() => setActiveTab("managers")}>
            По менеджерам
          </button>
          <button className={"tab-btn" + (activeTab==="departments" ? " active" : "")}
                  onClick={() => setActiveTab("departments")}>
            По отделам
          </button>
          <button className={"tab-btn" + (activeTab==="clients" ? " active" : "")}
                  onClick={() => setActiveTab("clients")}>
            Клиенты
          </button>
          <button className={"tab-btn" + (activeTab==="ar-aging" ? " active" : "")}
                  onClick={() => setActiveTab("ar-aging")}>
            ДЗ
          </button>
          <button className={"tab-btn" + (activeTab==="inventory" ? " active" : "")}
                  onClick={() => setActiveTab("inventory")}>
            Запасы
          </button>
          <button className={"tab-btn" + (activeTab==="cycle" ? " active" : "")}
                  onClick={() => setActiveTab("cycle")}>
            Цикл
          </button>
        </div>

        <div className="filter-summary">
        <div className="filter-summary-head">
          <div className="filter-summary-title">Фильтры</div>
          {filterSummaryItems.map(item => (
            <span key={item.key} className={"filter-summary-chip" + (item.active ? " active" : "")}>
              <span className="filter-summary-chip-label">{item.label}</span>
                <span>{item.value}</span>
              </span>
            ))}
        </div>
        <div className="filter-summary-actions">
          <button className="filter-summary-toggle"
                  type="button"
                  onClick={() => setFiltersCollapsed(v => !v)}>
            {filtersCollapsed ? "Показать фильтры" : "Свернуть фильтры"}
          </button>
          {filtersActive && (
            <button className="filter-reset"
                    onClick={resetFilters}
                    disabled={!filtersActive}>
              Сбросить
            </button>
          )}
        </div>
      </div>

        {!filtersCollapsed && (
          <div className="filter-bar">
            <div className="filter-bar-title">Фильтры</div>
            {FILTER_DEFS.map(def => (
              <MultiSelect key={def.key}
                           def={def}
                           value={filters[def.key]}
                           onChange={v => setFilter(def.key, v)}
                           dictQuery={dictQuery}/>
            ))}
          </div>
        )}

        {periodSummary && (
          <div className="period-compact" title={periodSummary.title}>
            <span className="period-compact-text">{periodSummary.text}</span>
          </div>
        )}

        {activeTab === "overview" && data && <ScoreLegend/>}

        {activeTab === "overview" && <OverviewChangePanel items={overviewChangeItems}/>}

        {err && <div className="err-panel"><b>Ошибка запроса:</b> {err}</div>}
        {customPeriodInvalid && <div className="err-panel"><b>Некорректный период:</b> {customPeriodError}</div>}

        {activeTab === "overview" && <NoticePanel title="Применены фильтры — обратите внимание" items={data?.warnings} icon="⚠" />}

        {activeTab === "overview" && data?.errors && data.errors.length > 0 && (
          <div className="err-panel">
            <b>Часть показателей не рассчиталась:</b>
            <ul>{data.errors.map((e,i) => <li key={i}>{e}</li>)}</ul>
          </div>
        )}

        {activeTab === "overview" && loading && (
          <div className="loading">
            <div className="spinner"></div>
            <div className="loading-text">Считаю KPI за {effectiveDays} дн. Это может занять до 30 секунд…</div>
          </div>
        )}

        {activeTab === "overview" && !loading && !data && !err && (
          <div className="empty-state">
            <div className="empty-state-ico">📊</div>
            <div className="empty-state-title">Выберите период и нажмите «Рассчитать»</div>
            <div className="empty-state-sub">Можно выбрать один из пресетов или задать свой диапазон дат</div>
          </div>
        )}

        {activeTab === "overview" && !loading && data && BLOCKS.map(block => (
          <div key={block.id} className="block">
            <div className="block-head">
              <div className={"block-ico "+block.icoClass}>{block.ico}</div>
              <div className="block-title">{block.title}</div>
              <div className="block-desc">· {block.desc}</div>
            </div>
            <div className="grid">
              {block.cards.map(bc => {
                const c = cardMap[bc.id];
                if (!c) return null;
                return <Card key={bc.id} card={c} sub={bc.sub} tip={bc.tip} compareLabel={compareLabel} period={data.period} extra={overviewCardExtras[bc.id]}/>;
              })}
              {block.id === "result" && (
                <OverviewRevenueBridge
                  summary={data?.insights?.revenue_bridge}
                  compareLabel={compareLabel}
                />
              )}
              {block.id === "stock" && (
                <OverviewDeadStockCard
                  summary={data?.insights?.dead_stock}
                />
              )}
            </div>
          </div>
        ))}

        {activeTab === "overview" && !loading && data && (
          <OverviewAgingPanel
            data={visibleArAgingData}
            loading={arAgingLoading}
            err={arAgingErr}
            overviewArRub={cardMap.ar_rub?.value}
            salesOnlyFiltersActive={Boolean(
              (data?.filters?.sale_type_ids || []).length
              || (data?.filters?.auction_flags || []).length
              || (data?.filters?.product_group_ids || []).length
            )}
          />
        )}

        {activeTab === "branches" && (
          <BranchView
            data={visibleBranchData}
            loading={loading || branchLoading}
            err={branchErr || (!data && err ? err : null)}
            requestKey={requestKey}
          />
        )}

        {activeTab === "managers" && (
          <ManagerView
            data={visibleManagerData}
            loading={loading || managerLoading}
            err={managerErr || (!data && err ? err : null)}
            requestKey={requestKey}
          />
        )}

        {activeTab === "departments" && (
          <DepartmentView
            data={visibleDeptData}
            loading={loading || deptLoading}
            err={deptErr || (!data && err ? err : null)}
            requestKey={requestKey}
          />
        )}

        {activeTab === "clients" && (
          <ClientView
            data={visibleClientData}
            loading={loading || clientLoading}
            err={clientErr || (!data && err ? err : null)}
          />
        )}

        {activeTab === "ar-aging" && (
          <ArAgingView
            data={visibleArAgingData}
            loading={loading || arAgingLoading}
            err={arAgingErr || (!data && err ? err : null)}
          />
        )}

        {activeTab === "inventory" && (
          <InventoryView
            data={visibleInventoryData}
            loading={loading || inventoryLoading}
            err={inventoryErr || (!data && err ? err : null)}
          />
        )}

        {activeTab === "cycle" && (
          <CycleView
            data={data}
            loading={loading}
            err={err}
          />
        )}
      </div>
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  window.__BOOT_OK = true;
  console.log("[KPI] React mounted");
} catch (e) {
  console.error("[KPI] Mount failed:", e);
  document.getElementById("root").innerHTML =
    '<div style="padding:24px;color:#b91c1c;font-family:system-ui;">Mount failed: ' + e.message + '</div>';
}
</script>
</body>
</html>
